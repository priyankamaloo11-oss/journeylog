<script>
// Persistent storage backed by IndexedDB (no size worries for ticket images)
const __dbp = new Promise((res, rej) => {
  const r = indexedDB.open("journeylog", 1);
  r.onupgradeneeded = () => r.result.createObjectStore("kv");
  r.onsuccess = () => res(r.result);
  r.onerror = () => rej(r.error);
});
function __tx(mode, fn) {
  return __dbp.then((db) => new Promise((res, rej) => {
    const t = db.transaction("kv", mode);
    const req = fn(t.objectStore("kv"));
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}
window.storage = {
  async get(key) {
    const v = await __tx("readonly", (s) => s.get(key));
    if (v === undefined) throw new Error("not found");
    return { key, value: v };
  },
  async set(key, value) { await __tx("readwrite", (s) => s.put(value, key)); return { key, value }; },
  async delete(key) { await __tx("readwrite", (s) => s.delete(key)); return { key, deleted: true }; },
  async list(prefix) {
    const keys = await __tx("readonly", (s) => s.getAllKeys());
    return { keys: keys.filter((k) => !prefix || String(k).startsWith(prefix)) };
  },
};
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
}
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const KEY = "wave-travel-planner-v1";
const uid = () => Math.random().toString(36).slice(2, 10);

const SEED_FLAG = "seed-jul-aug-2026";
const SEED_TRIPS = [
  {
    id: "seed-blr-1", name: "BLR Trip 1", destination: "Bengaluru via Ahmedabad",
    start: "2026-07-27", end: "2026-08-05", notes: "", reminders: [], checklist: [],
    tickets: [
      { id: "s1a", type: "bus", title: "BHL → AHM", from: "BHL", to: "AHM", date: "2026-07-27", time: "", ref: "", seat: "", notes: "", status: "booked" },
      { id: "s1b", type: "flight", title: "AHM → BLR", from: "AHM", to: "BLR", date: "2026-07-28", time: "", ref: "", seat: "", notes: "", status: "booked" },
      { id: "s1c", type: "flight", title: "BLR → AHM", from: "BLR", to: "AHM", date: "2026-08-05", time: "", ref: "", seat: "", notes: "", status: "booked" },
      { id: "s1d", type: "bus", title: "AHM → BHL", from: "AHM", to: "BHL", date: "2026-08-05", time: "", ref: "", seat: "", notes: "", status: "booked" },
    ],
  },
  {
    id: "seed-blr-2", name: "BLR Trip 2", destination: "Bengaluru via Ahmedabad",
    start: "2026-08-11", end: "2026-08-19", notes: "", reminders: [], checklist: [],
    tickets: [
      { id: "s2a", type: "bus", title: "BHL → AHM", from: "BHL", to: "AHM", date: "2026-08-11", time: "", ref: "", seat: "", notes: "", status: "booked" },
      { id: "s2b", type: "flight", title: "AHM → BLR", from: "AHM", to: "BLR", date: "2026-08-12", time: "", ref: "", seat: "", notes: "", status: "booked" },
      { id: "s2c", type: "flight", title: "BLR → AHM", from: "BLR", to: "AHM", date: "2026-08-19", time: "", ref: "", seat: "", notes: "", status: "booked" },
      { id: "s2d", type: "bus", title: "AHM → BHL", from: "AHM", to: "BHL", date: "2026-08-19", time: "", ref: "", seat: "", notes: "Bus booking window not open yet", status: "pending" },
    ],
  },
];

const TYPE_META = {
  flight: { icon: "✈️", label: "Flight" },
  train: { icon: "🚆", label: "Train" },
  bus: { icon: "🚌", label: "Bus" },
  hotel: { icon: "🏨", label: "Hotel" },
  other: { icon: "🎫", label: "Other" },
};

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const [y, m, d] = dateStr.split("-").map(Number);
  const target = new Date(y, m - 1, d);
  const now = new Date();
  const base = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((target - base) / 86400000);
}
function fmtDate(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("en-IN", {
    day: "numeric", month: "short", year: "numeric",
  });
}
function fmtTime(t) {
  if (!t) return "";
  const [h, min] = t.split(":").map(Number);
  const ampm = h >= 12 ? "PM" : "AM";
  const hr = h % 12 === 0 ? 12 : h % 12;
  return `${hr}:${String(min).padStart(2, "0")} ${ampm}`;
}
function Countdown({ dateStr }) {
  const d = daysUntil(dateStr);
  if (d === null || d < 0) return null;
  const text = d === 0 ? "Today" : d === 1 ? "Tomorrow" : `In ${d} days`;
  const hot = d <= 1;
  return <span className={"badge " + (hot ? "badge-hot" : "")}>{text}</span>;
}

function TravelPlanner() {
  const [data, setData] = useState({ trips: [] });
  const [loaded, setLoaded] = useState(false);
  const [saveErr, setSaveErr] = useState(false);
  const [screen, setScreen] = useState({ name: "home" });
  const [modal, setModal] = useState(null); // {kind, tripId?, edit?}
  const [viewImg, setViewImg] = useState(null); // {title, src}
  const [calStatus, setCalStatus] = useState(null);
  const [sharedFile, setSharedFile] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        if (typeof window !== "undefined" && new URLSearchParams(window.location.search).get("shared") === "1") {
          const res = await window.storage.get("__shared");
          if (res && res.value) setSharedFile(res.value);
          window.history.replaceState({}, "", window.location.pathname);
        }
      } catch (e) { /* nothing shared */ }
    })();
  }, []);

  async function attachShared(tripId, tk) {
    await uploadTicketImage(tripId, tk, sharedFile);
    try { await window.storage.delete("__shared"); } catch (e) { /* fine */ }
    setSharedFile(null);
  }

  async function uploadTicketImage(tripId, tk, file, kind) {
    const k = kind || "tkimg";
    try {
      const dataUrl = await fileToDataUrl(file);
      const res = await window.storage.set(k + ":" + tk.id, dataUrl);
      if (!res) throw new Error("save failed");
      persist({ ...data, trips: data.trips.map((t) =>
        t.id === tripId ? { ...t, tickets: t.tickets.map((x) =>
          x.id === tk.id
            ? (k === "bp"
              ? { ...x, bpImg: true }
              : { ...x, img: true, archived: true, status: "booked", fileRef: x.fileRef || "Saved in app" })
            : x) } : t) });
    } catch (e) {
      alert("Couldn't save that image. Try a screenshot or a smaller photo.");
    }
  }
  async function openTicketImage(tk, kind) {
    const k = kind || "tkimg";
    try {
      const res = await window.storage.get(k + ":" + tk.id);
      if (res && res.value) setViewImg({ title: tk.title + (k === "bp" ? " — Boarding pass" : ""), src: res.value });
      else alert("No image found — upload it again.");
    } catch (e) {
      alert("No image found — upload it again.");
    }
  }
  async function removeTicketImage(tripId, tk, kind) {
    const k = kind || "tkimg";
    try { await window.storage.delete(k + ":" + tk.id); } catch (e) { /* already gone */ }
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, tickets: t.tickets.map((x) =>
        x.id === tk.id ? (k === "bp" ? { ...x, bpImg: false } : { ...x, img: false }) : x) } : t) });
  }

  const [fareView, setFareView] = useState(null);
  async function checkFare(tk) {
    const url = tk.type === "flight"
      ? "https://www.google.com/travel/flights?q=" + encodeURIComponent("Flights from " + tk.from + " to " + tk.to + " on " + tk.date)
      : "https://www.google.com/search?q=" + encodeURIComponent("bus " + tk.from + " to " + tk.to + " " + tk.date + " fare redbus");
    window.open(url, "_blank");
  }

  function toggleDeskWeek(tripId, ids, value) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, officeDays: t.officeDays.map((o) => (ids.includes(o.id) ? { ...o, booked: value } : o)) } : t) });
  }
  function deleteOfficeDays(tripId, ids) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, officeDays: t.officeDays.filter((o) => !ids.includes(o.id)) } : t) });
  }
  function addOfficeWeek(tripId, ds) {
    if (!ds) return;
    const mon = mondayOf(ds);
    const days = [0, 1, 2, 3, 4].map((i) => shiftDays(mon, i)).filter((x) => !HOLIDAYS[x]);
    persist({ ...data, trips: data.trips.map((t) => {
      if (t.id !== tripId) return t;
      const have = new Set((t.officeDays || []).map((o) => o.date));
      return { ...t, officeDays: [...(t.officeDays || []), ...days.filter((x) => !have.has(x)).map((x) => ({ id: uid(), date: x, booked: false }))] };
    }) });
  }

  function createPlannedTrip(out, back) {
    if (!out || !back || back < out) { alert("Return date must be after the outward date."); return; }
    const cap = (ds, n) => { const w = shiftDays(ds, -n); return daysUntil(w) < 0 ? todayStr() : w; };
    const officeDays = [];
    let m = mondayOf(out);
    const lastMon = mondayOf(back);
    while (m <= lastMon) {
      for (const off of [1, 2, 3]) {
        const dsx = shiftDays(m, off);
        if (dsx > out && dsx < back && !HOLIDAYS[dsx]) officeDays.push({ id: uid(), date: dsx, booked: false });
      }
      m = shiftDays(m, 7);
    }
    const trip = {
      id: uid(), name: "BLR: " + fmtDate(out) + " – " + fmtDate(back), destination: "Bengaluru via Ahmedabad",
      start: out, end: back, notes: "Planned trip — adjust legs and office days as needed.",
      reminders: [], checklist: [], officeDays,
      tickets: [
        { id: uid(), type: "bus", title: "BHL → AHM", from: "BHL", to: "AHM", date: out, time: "", ref: "", seat: "", notes: "", status: "pending", journey: "onward", bookOpen: cap(out, 15) },
        { id: uid(), type: "flight", title: "AHM → BLR", from: "AHM", to: "BLR", date: shiftDays(out, 1), time: "", ref: "", seat: "", notes: "", status: "pending", journey: "onward", bookOpen: cap(shiftDays(out, 1), 30) },
        { id: uid(), type: "flight", title: "BLR → AHM", from: "BLR", to: "AHM", date: back, time: "", ref: "", seat: "", notes: "", status: "pending", journey: "return", bookOpen: cap(back, 30) },
        { id: uid(), type: "bus", title: "AHM → BHL", from: "AHM", to: "BHL", date: back, time: "", ref: "", seat: "", notes: "", status: "pending", journey: "return", bookOpen: cap(back, 15) },
      ],
    };
    persist({ ...data, trips: [...data.trips, trip] });
    setModal(null);
  }

  async function syncCalendar(events) {
    if (!events.length) return;
    try {
      const esc = (s) => String(s).replace(/[\\;,]/g, " ").replace(/\n/g, " ");
      const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
      const body = events.map((e) => {
        const dt = e.date.replace(/-/g, "") + "T" + e.time.replace(":", "") + "00";
        return ["BEGIN:VEVENT", "UID:" + e.key + "@aviyatra", "DTSTAMP:" + stamp,
          "DTSTART;TZID=Asia/Kolkata:" + dt, "DURATION:PT30M", "SUMMARY:" + esc(e.title),
          "BEGIN:VALARM", "TRIGGER:PT0M", "ACTION:DISPLAY", "DESCRIPTION:" + esc(e.title), "END:VALARM",
          "END:VEVENT"].join("\r\n");
      }).join("\r\n");
      const ics = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//AviYatra//EN", body, "END:VCALENDAR"].join("\r\n");
      const blob = new Blob([ics], { type: "text/calendar" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "aviyatra-alarms.ics";
      a.click();
      persist({ ...data, calSynced: [...(data.calSynced || []), ...events.map((e) => e.key)] });
      setCalStatus("done");
    } catch (e) {
      setCalStatus("error");
    }
  }

  useEffect(() => {
    (async () => {
      let d = { trips: [] };
      try {
        const res = await window.storage.get(KEY);
        if (res && res.value) d = JSON.parse(res.value);
      } catch (e) {
        /* first run — no data yet */
      }
      let seeded = false;
      try {
        const flag = await window.storage.get(SEED_FLAG);
        seeded = !!flag;
      } catch (e) {
        seeded = false;
      }
      if (!seeded) {
        const ids = new Set(d.trips.map((t) => t.id));
        d = { ...d, trips: [...d.trips, ...SEED_TRIPS.filter((t) => !ids.has(t.id))] };
        try {
          await window.storage.set(KEY, JSON.stringify(d));
          await window.storage.set(SEED_FLAG, "1");
        } catch (e) { /* will retry next open */ }
      }
      // One-time fix: BHL↔AHM legs are by bus
      let fixed = false;
      d = { ...d, trips: d.trips.map((t) => ({ ...t, tickets: (t.tickets || []).map((tk) => {
        if (["s1a", "s1d", "s2a", "s2d"].includes(tk.id) && tk.type !== "bus") { fixed = true; return { ...tk, type: "bus" }; }
        return tk;
      }) })) };
      if (fixed) {
        try { await window.storage.set(KEY, JSON.stringify(d)); } catch (e) { /* retry next open */ }
      }
      // Seed office days: in office ALL working days 28 Jul – 5 Aug
      let officeSeeded = false;
      try {
        const f2 = await window.storage.get("seed-office-blr1");
        officeSeeded = !!f2;
      } catch (e) { officeSeeded = false; }
      if (!officeSeeded) {
        const OFFICE_DATES = ["2026-07-28", "2026-07-29", "2026-07-30", "2026-07-31", "2026-08-03", "2026-08-04", "2026-08-05"];
        d = { ...d, trips: d.trips.map((t) => {
          if (t.id !== "seed-blr-1") return t;
          const have = new Set((t.officeDays || []).map((o) => o.date));
          return { ...t, officeDays: [...(t.officeDays || []), ...OFFICE_DATES.filter((x) => !have.has(x)).map((x) => ({ id: uid(), date: x, booked: false }))] };
        }) };
        try {
          await window.storage.set(KEY, JSON.stringify(d));
          await window.storage.set("seed-office-blr1", "1");
        } catch (e) { /* retry next open */ }
      }
      // Seed Denmark trip (25–31 Oct 2026, via Delhi — no BLR that week) + seat preference
      let dkSeeded = false;
      try {
        const f3 = await window.storage.get("seed-denmark-2026");
        dkSeeded = !!f3;
      } catch (e) { dkSeeded = false; }
      if (!dkSeeded) {
        if (!d.trips.some((t) => t.id === "seed-denmark")) {
          d = { ...d, trips: [...d.trips, {
            id: "seed-denmark", name: "Denmark Trip", destination: "Denmark via Delhi",
            start: "2026-10-25", end: "2026-10-31", planOnly: true,
            notes: "Travelling directly from Bhilwara via Delhi — NO BLR office travel this week.",
            officeDays: [], reminders: [], checklist: [], tickets: [],
          }] };
        }
        try {
          await window.storage.set(KEY, JSON.stringify(d));
          await window.storage.set("seed-denmark-2026", "1");
        } catch (e) { /* retry next open */ }
      }
      // Denmark stays on the calendar only — no booking tracking
      let dkFixed = false;
      d = { ...d, trips: d.trips.map((t) => {
        if (t.id !== "seed-denmark") return t;
        if ((t.tickets || []).length > 0 || !t.planOnly) { dkFixed = true; return { ...t, tickets: [], planOnly: true }; }
        return t;
      }) };
      if (dkFixed) {
        try { await window.storage.set(KEY, JSON.stringify(d)); } catch (e) { /* retry next open */ }
      }
      if (!d.settings) d = { ...d, settings: { deskSeat: "233" } };
      // Journey grouping + friendly trip names
      const ONWARD_IDS = ["s1a", "s1b", "s2a", "s2b"];
      const RETURN_IDS = ["s1c", "s1d", "s2c", "s2d"];
      let jFixed = false;
      d = { ...d, trips: d.trips.map((t) => {
        let name = t.name;
        if (t.id === "seed-blr-1" && /Trip 1/i.test(name)) name = "BLR: 27 Jul – 5 Aug";
        if (t.id === "seed-blr-2" && /Trip 2/i.test(name)) name = "BLR: 11 – 19 Aug";
        let changed = name !== t.name;
        const tickets = (t.tickets || []).map((tk) => {
          if (tk.journey) return tk;
          const j = ONWARD_IDS.includes(tk.id) ? "onward" : RETURN_IDS.includes(tk.id) ? "return" : "";
          if (!j) return tk;
          changed = true;
          return { ...tk, journey: j };
        });
        if (changed) { jFixed = true; return { ...t, name, tickets }; }
        return t;
      }) };
      if (jFixed) {
        try { await window.storage.set(KEY, JSON.stringify(d)); } catch (e) { /* retry next open */ }
      }
      setData(d);
      setLoaded(true);
    })();
  }, []);

  async function persist(next) {
    setData(next);
    try {
      const res = await window.storage.set(KEY, JSON.stringify(next));
      setSaveErr(!res);
    } catch (e) {
      setSaveErr(true);
    }
  }

  const trips = useMemo(
    () => [...data.trips].sort((a, b) => (a.start || "9999").localeCompare(b.start || "9999")),
    [data.trips]
  );
  const activeTrip = screen.name === "trip" ? data.trips.find((t) => t.id === screen.tripId) : null;

  // ---------- Upcoming feed ----------
  const feed = useMemo(() => {
    const items = [];
    for (const t of data.trips) {
      if (t.planOnly && t.start) items.push({ date: t.start, icon: "🧳", title: `${t.name} begins`, sub: t.destination, tripId: t.id });
      const jmap = {};
      for (const tk of t.tickets || []) {
        if (!tk.date) continue;
        const j = tk.journey === "onward" || tk.journey === "return" ? tk.journey : "leg:" + tk.id;
        (jmap[j] = jmap[j] || []).push(tk);
      }
      for (const key of Object.keys(jmap)) {
        const legs = jmap[key].sort((a, b) => ((a.date || "") + (a.time || "")).localeCompare((b.date || "") + (b.time || "")));
        const first = legs[0], last = legs[legs.length - 1];
        const single = key.indexOf("leg:") === 0;
        items.push({
          date: first.date, time: first.time,
          icon: single ? (TYPE_META[first.type]?.icon || "🎫") : "🧭",
          title: single ? (first.title || TYPE_META[first.type]?.label) : `${key === "onward" ? "Onward" : "Return"}: ${first.from} → ${last.to}`,
          sub: t.name, tripId: t.id,
        });
      }
      for (const r of t.reminders || []) {
        if (r.date) items.push({ date: r.date, icon: "🔔", title: r.text, sub: t.name, tripId: t.id });
      }
    }
    return items
      .filter((i) => { const d = daysUntil(i.date); return d !== null && d >= 0; })
      .sort((a, b) => (a.date + (a.time || "")).localeCompare(b.date + (b.time || "")))
      .slice(0, 6);
  }, [data.trips]);

  // ---------- Mutations ----------
  function saveTrip(form, editId) {
    const next = { ...data };
    if (editId) {
      next.trips = next.trips.map((t) => (t.id === editId ? { ...t, ...form } : t));
    } else {
      next.trips = [...next.trips, { id: uid(), tickets: [], reminders: [], checklist: [], ...form }];
    }
    persist(next);
    setModal(null);
  }
  function deleteTrip(id) {
    persist({ ...data, trips: data.trips.filter((t) => t.id !== id) });
    setScreen({ name: "home" });
  }
  function saveTicket(tripId, form, editId) {
    const next = { ...data, trips: data.trips.map((t) => {
      if (t.id !== tripId) return t;
      const tickets = editId
        ? t.tickets.map((tk) => (tk.id === editId ? { ...tk, ...form } : tk))
        : [...(t.tickets || []), { id: uid(), ...form }];
      return { ...t, tickets };
    })};
    persist(next);
    setModal(null);
  }
  function deleteTicket(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, tickets: t.tickets.filter((tk) => tk.id !== id) } : t) });
  }
  function saveReminder(tripId, form) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, reminders: [...(t.reminders || []), { id: uid(), ...form }] } : t) });
    setModal(null);
  }
  function deleteReminder(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, reminders: t.reminders.filter((r) => r.id !== id) } : t) });
  }
  function addOfficeDay(tripId, date) {
    if (!date) return;
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, officeDays: [...(t.officeDays || []), { id: uid(), date, booked: false }] } : t) });
  }
  function toggleDesk(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, officeDays: t.officeDays.map((o) => (o.id === id ? { ...o, booked: !o.booked } : o)) } : t) });
  }
  function deleteOfficeDay(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, officeDays: t.officeDays.filter((o) => o.id !== id) } : t) });
  }
  function duplicateTrip(id) {
    const t = data.trips.find((x) => x.id === id);
    if (!t) return;
    const copy = {
      ...t, id: uid(), name: t.name + " (copy)",
      start: shiftDays(t.start, 7), end: shiftDays(t.end, 7),
      tickets: (t.tickets || []).map((tk) => ({ ...tk, id: uid(), date: shiftDays(tk.date, 7), status: "pending", archived: false, ref: "", bookOpen: "", img: false, bpImg: false })),
      officeDays: (t.officeDays || []).map((o) => ({ ...o, id: uid(), date: shiftDays(o.date, 7), booked: false })),
      reminders: (t.reminders || []).map((r) => ({ ...r, id: uid(), date: shiftDays(r.date, 7) })),
      checklist: (t.checklist || []).map((c) => ({ ...c, id: uid(), done: false })),
    };
    persist({ ...data, trips: [...data.trips, copy] });
    setScreen({ name: "home" });
  }
  function addCheckItem(tripId, text) {
    if (!text.trim()) return;
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, checklist: [...(t.checklist || []), { id: uid(), text: text.trim(), done: false }] } : t) });
  }
  function toggleCheck(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, checklist: t.checklist.map((c) => (c.id === id ? { ...c, done: !c.done } : c)) } : t) });
  }
  function deleteCheck(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, checklist: t.checklist.filter((c) => c.id !== id) } : t) });
  }

  if (!loaded) return <div className="app"><Style /><div className="loading">Opening your travel desk…</div></div>;

  return (
    <div className="app">
      <Style />
      {saveErr && <div className="save-warn">Couldn't save just now — your last change may not persist. Try again.</div>}

      {screen.name === "home" && (

          trips={trips} feed={feed}

          calSynced={data.calSynced || []} calStatus={calStatus}
          onSyncCalendar={(events) => syncCalendar(events)}
          onPlanWeek={(mon) => setModal({ kind: "plan", mon })}

      {fareView && (

      {screen.name === "trip" && activeTrip && (

  const desksToBook = [];
  for (const t of trips) {
    for (const tk of t.tickets || []) {
      const future = !tk.date || daysUntil(tk.date) >= 0;
      if (tk.status === "pending" && future) toBook.push({ ...tk, tripName: t.name, tripId: t.id });
      else if (tk.status !== "pending" && !tk.archived && future) toArchive.push({ ...tk, tripName: t.name, tripId: t.id });

  // Alarm events for Google Calendar: one per desk window + one per pending ticket

  for (const o of desksToBook) {
    if (!winMap.has(o.open)) winMap.set(o.open, []);
    winMap.get(o.open).push(o.date);
  }

    const key = "desk:" + open;

function parseDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function dsOf(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

// Office desk window: opens Friday night 12, for the week after next.
// e.g. Fri 17 Jul night opens Mon 27 – Fri 31 Jul.
function deskWindowOpenDate(dateStr) {
  const d = parseDate(dateStr);
  const monday = new Date(d.getFullYear(), d.getMonth(), d.getDate() - ((d.getDay() + 6) % 7));
  return dsOf(new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() - 10));
}

function shiftDays(dateStr, n) {
  if (!dateStr) return dateStr;
  const d = parseDate(dateStr);
  return dsOf(new Date(d.getFullYear(), d.getMonth(), d.getDate() + n));
}

const HOLIDAYS = {
  "2026-08-26": "Office holiday",
  "2026-08-28": "Office holiday",
  "2026-09-14": "Office holiday",
  "2026-10-02": "Office holiday",
  "2026-11-10": "Office holiday",
  "2026-12-25": "Office holiday",
};

function mondayOf(ds) {
  const d = parseDate(ds);
  return dsOf(new Date(d.getFullYear(), d.getMonth(), d.getDate() - ((d.getDay() + 6) % 7)));
}

function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("read failed"));
    r.readAsDataURL(file);
  });
}

async function compressImage(file) {
  const src = await readFileAsDataURL(file);
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => rej(new Error("not an image"));
    i.src = src;
  });
  const maxDim = 2000;
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const c = document.createElement("canvas");
  c.width = Math.round(img.width * scale);
  c.height = Math.round(img.height * scale);
  c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
  return c.toDataURL("image/jpeg", 0.85);
}

function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve();
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      res();
    };
    s.onerror = () => rej(new Error("pdf.js load failed"));
    document.head.appendChild(s);
  });
}

async function fileToDataUrl(file) {
  if (file && file.type === "application/pdf") {
    await loadPdfJs();
    const buf = await file.arrayBuffer();
    const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
    const page = await pdf.getPage(1);
    const vp = page.getViewport({ scale: 2 });
    const c = document.createElement("canvas");
    c.width = vp.width;
    c.height = vp.height;
    await page.render({ canvasContext: c.getContext("2d"), viewport: vp }).promise;
    return c.toDataURL("image/jpeg", 0.9);
  }
  return compressImage(file);
}

function CalendarView({ trips, openTrip }) {
  const now = new Date();
  const [cur, setCur] = useState({ y: now.getFullYear(), m: now.getMonth() });
  const [sel, setSel] = useState(todayStr());

  const dayInfo = useMemo(() => {
    const map = {};
    const ensure = (ds) => (map[ds] = map[ds] || { trips: [], tickets: [], reminders: [], desks: [] });
    for (const t of trips) {
      if (t.start) {
        let d = parseDate(t.start);
        const e = parseDate(t.end || t.start);
        let guard = 0;
        while (d <= e && guard < 370) {
          ensure(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`).trips.push(t);
          d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
          guard++;
        }
      }
      for (const tk of t.tickets || []) {
        if (tk.date) ensure(tk.date).tickets.push({ ...tk, tripName: t.name, tripId: t.id });
      }
      for (const r of t.reminders || []) {
        if (r.date) ensure(r.date).reminders.push({ ...r, tripName: t.name, tripId: t.id });
      }
      for (const o of t.officeDays || []) {
        if (o.date) ensure(o.date).desks.push({ ...o, tripName: t.name, tripId: t.id });
      }
    }
    return map;
  }, [trips]);

  const first = new Date(cur.y, cur.m, 1);
  const offset = first.getDay();
  const nDays = new Date(cur.y, cur.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(null);
  for (let d = 1; d <= nDays; d++) cells.push(d);
  const monthName = first.toLocaleDateString("en-IN", { month: "long", year: "numeric" });

  const selInfo = dayInfo[sel];
  const selTickets = selInfo?.tickets || [];
  const selReminders = selInfo?.reminders || [];
  const selTrips = selInfo?.trips || [];

  return (
    <section>
      <div className="cal-head">
        <button className="btn-ghost arrow" onClick={() => setCur((c) => (c.m === 0 ? { y: c.y - 1, m: 11 } : { y: c.y, m: c.m - 1 }))}>‹</button>
        <div className="cal-month">{monthName}</div>
        <button className="btn-ghost arrow" onClick={() => setCur((c) => (c.m === 11 ? { y: c.y + 1, m: 0 } : { y: c.y, m: c.m + 1 }))}>›</button>
      </div>

      <div className="cal-grid">
        {["S", "M", "T", "W", "T", "F", "S"].map((w, i) => <div key={"w" + i} className="cal-wd">{w}</div>)}
        {cells.map((d, i) => {
          if (d === null) return <div key={"e" + i} />;
          const ds = `${cur.y}-${String(cur.m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          const info = dayInfo[ds];
          const dayTk = info?.tickets || [];
          const desks = info?.desks || [];
          const inTrip = (info?.trips.length || 0) > 0;
          const travelDay = (info?.trips || []).some((t) => !t.planOnly && (ds === t.start || ds === (t.end || t.start)));
          const bookedTks = dayTk.filter((tk) => tk.status !== "pending");
          const hasPending = dayTk.some((tk) => tk.status === "pending")
            || desks.some((o) => !o.booked)
            || (travelDay && dayTk.length === 0);
          const doneCount = bookedTks.length + desks.filter((o) => o.booked).length;
          const unarchived = bookedTks.some((tk) => !tk.archived);
          const hasRem = (info?.reminders.length || 0) > 0;
          const isHol = !!HOLIDAYS[ds];
          const icons = [...new Set([...(isHol ? ["🎉"] : []), ...dayTk.map((tk) => TYPE_META[tk.type]?.icon || "🎫"), ...(desks.length ? ["🪑"] : [])])].slice(0, 2);
          return (
            <button key={ds}
              className={"cal-day" + (inTrip ? " in-trip" : "") + (isHol ? " holiday" : "") + (ds === todayStr() ? " today" : "") + (ds === sel ? " sel" : "")}
              onClick={() => setSel(ds)}>
              <span>{d}</span>
              <span className="cal-icons">{icons.join("")}</span>
              <span className="cal-dots">
                {hasPending && <i className="dot pending" />}
                {doneCount > 0 && <i className={"dot " + (unarchived ? "booked" : "saved")} />}
                {hasRem && <i className="dot rem" />}
              </span>
            </button>
          );
        })}
      </div>

      <div className="cal-legend">
        <span>✈️🚌 Travel · 🪑 Office · 🎉 Holiday</span>
        <span><i className="dot saved" /> Booked + copy saved</span>
        <span><i className="dot booked" /> Booked, copy NOT saved</span>
        <span><i className="dot pending" /> Not booked yet</span>
        <span><i className="dot rem" /> Reminder</span>
      </div>

      <div className="cal-detail">
        <div className="section-label">{fmtDate(sel)}</div>
        {HOLIDAYS[sel] && (
          <div className="feed-row static holiday-row">
            <span className="feed-icon">🎉</span>
            <span className="feed-main">
              <span className="feed-title">{HOLIDAYS[sel]}</span>
              <span className="feed-sub">Avoid being in Bengaluru — plan travel around this or take WFH</span>
            </span>
          </div>
        )}
        {!selInfo && !HOLIDAYS[sel] && <div className="empty"><p>Nothing planned on this day.</p></div>}
        {selTickets.map((tk) => (
          <button key={tk.id} className="feed-row" onClick={() => openTrip(tk.tripId)}>
            <span className="feed-icon">{TYPE_META[tk.type]?.icon || "🎫"}</span>
            <span className="feed-main">
              <span className="feed-title">{tk.title}</span>
              <span className="feed-sub">{tk.tripName}{tk.time ? " · " + fmtTime(tk.time) : ""}{tk.ref ? " · " + tk.ref : ""}</span>
            </span>
            {tk.status === "pending"
              ? <span className="badge badge-warn">Not booked</span>
              : tk.archived
                ? <span className="badge badge-ok">📎 Saved</span>
                : <span className="badge badge-amber">📎 No copy</span>}
          </button>
        ))}
        {selReminders.map((r) => (
          <button key={r.id} className="feed-row" onClick={() => openTrip(r.tripId)}>
            <span className="feed-icon">🔔</span>
            <span className="feed-main">
              <span className="feed-title">{r.text}</span>
              <span className="feed-sub">{r.tripName}</span>
            </span>
          </button>
        ))}
        {(selInfo?.desks || []).map((o) => {
          const dOpen = daysUntil(deskWindowOpenDate(o.date));
          return (
            <button key={o.id} className="feed-row" onClick={() => openTrip(o.tripId)}>
              <span className="feed-icon">🪑</span>
              <span className="feed-main">
                <span className="feed-title">Office day</span>
                <span className="feed-sub">{o.tripName}{!o.booked && dOpen > 0 ? " · window opens " + fmtDate(deskWindowOpenDate(o.date)) : ""}</span>
              </span>
              {o.booked
                ? <span className="badge badge-ok">Desk booked</span>
                : dOpen <= 0
                  ? <span className="badge badge-hot">Book desk now!</span>
                  : <span className="badge badge-warn">Desk pending</span>}
            </button>
          );
        })}
        {selTrips.map((t) => {
          const bookedHere = selTickets.some((tk) => tk.tripId === t.id);
          const travelDay = !t.planOnly && (sel === t.start || sel === (t.end || t.start));
          return (
            <button key={t.id} className="feed-row" onClick={() => openTrip(t.id)}>
              <span className="feed-icon">🧳</span>
              <span className="feed-main">
                <span className="feed-title">{t.name}</span>
                <span className="feed-sub">{t.destination || "Trip day"}</span>
              </span>
              {!bookedHere && travelDay && <span className="badge badge-warn">No ticket yet</span>}
            </button>
          );
        })}
      </div>
    </section>
  );
}

function PlanView({ trips, openTrip, onPlanWeek }) {
  const startMon = mondayOf(todayStr());
  const weeks = [];
  for (let i = 0; i < 52; i++) {
    const mon = shiftDays(startMon, i * 7);
    const fri = shiftDays(mon, 4);
    const weekDates = [0, 1, 2, 3, 4].map((n) => shiftDays(mon, n));
    const hols = weekDates.filter((x) => HOLIDAYS[x]);
    const trip = trips.find((t) => t.start && (t.end || t.start) >= mon && t.start <= fri);
    const nearHol = !hols.length && Object.keys(HOLIDAYS).some((h) => Math.abs(daysUntil(h) - daysUntil(mon)) <= 10);
    weeks.push({ mon, fri, hols, trip, nearHol });
  }
  return (
    <section>
      <p className="hint" style={{ marginBottom: 12 }}>Full year ahead (52 weeks). Tap + Plan on a free week, set your travel-out and return dates (any span) — legs and 3 office days per week are created automatically, with book-by alarms ~1 month early for flights. Holiday weeks suggest WFH instead.</p>
      {weeks.map((w) => (
        <div key={w.mon} className={"feed-row static" + (w.hols.length && !w.trip ? " warn-row" : "")}>
          <span className="feed-icon">{w.trip ? "✅" : w.hols.length ? "🎉" : "🧳"}</span>
          <span className="feed-main">
            <span className="feed-title">{fmtDate(w.mon)} – {fmtDate(w.fri)}</span>
            <span className="feed-sub">
              {w.trip ? "Planned: " + w.trip.name
                : w.hols.length ? `Holiday${w.hols.length > 1 ? "s" : ""} on ${w.hols.map((h) => fmtDate(h)).join(", ")} — suggest WFH exemption / skip travel`
                : w.nearHol ? "Free — festival nearby, book flights EXTRA early if travelling"
                : "Free — office week?"}
            </span>
          </span>
          {w.trip
            ? <button className="btn-ghost small" onClick={() => openTrip(w.trip.id)}>Open</button>
            : !w.hols.length && <button className="btn-accent" style={{ padding: "6px 10px", fontSize: 12 }}
                onClick={() => onPlanWeek(w.mon)}>+ Plan</button>}
        </div>
      ))}
    </section>
  );
}

function TripCard({ trip, onClick, muted }) {
  const nTickets = (trip.tickets || []).length;
  return (
    <button className={"trip-card" + (muted ? " muted" : "")} onClick={onClick}>
      <div className="trip-card-top">
        <span className="trip-name">{trip.name}</span>
        <Countdown dateStr={trip.start} />
      </div>
      <div className="trip-meta">
        {trip.destination && <span>📍 {trip.destination}</span>}
        {trip.start && <span>{fmtDate(trip.start)}{trip.end ? " → " + fmtDate(trip.end) : ""}</span>}
        <span>{nTickets} ticket{nTickets === 1 ? "" : "s"}</span>
      </div>
    </button>
  );
}

function TripScreen(p) {
  const { trip, tab, setTab } = p;
  const [checkText, setCheckText] = useState("");
  const [officeDate, setOfficeDate] = useState("");
  const [openJ, setOpenJ] = useState({});
  const tickets = [...(trip.tickets || [])].sort((a, b) => ((a.date || "") + (a.time || "")).localeCompare((b.date || "") + (b.time || "")));
  const reminders = [...(trip.reminders || [])].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  const officeDays = [...(trip.officeDays || [])].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  const checklist = trip.checklist || [];
  const done = checklist.filter((c) => c.done).length;

  return (
    <>
      <header className="trip-header">
        <button className="btn-ghost" onClick={p.back}>← Trips</button>
        <div className="trip-header-actions">
          <button className="btn-ghost" onClick={p.onDuplicate}>Duplicate</button>
          <button className="btn-ghost" onClick={p.onEdit}>Edit</button>
          <button className="btn-ghost danger" onClick={p.onDelete}>Delete</button>
        </div>
      </header>
      <div className="trip-hero">
        <h2>{trip.name}</h2>
        <div className="trip-meta">
          {trip.destination && <span>📍 {trip.destination}</span>}
          {trip.start && <span>{fmtDate(trip.start)}{trip.end ? " → " + fmtDate(trip.end) : ""}</span>}
        </div>
        {trip.notes && <p className="trip-notes">{trip.notes}</p>}
      </div>

      <nav className="tabs">
        {[["tickets", `Tickets (${tickets.length})`], ["desk", `🪑 Desk (${officeDays.length})`], ["reminders", `Alerts (${reminders.length})`], ["packing", `Pack ${checklist.length ? `(${done}/${checklist.length})` : ""}`]].map(([id, label]) => (
          <button key={id} className={"tab" + (tab === id ? " on" : "")} onClick={() => setTab(id)}>{label}</button>
        ))}
      </nav>

      {tab === "tickets" && (
        <section>
          <button className="btn-accent full" onClick={p.onAddTicket}>+ Add ticket</button>
          {tickets.length === 0 && <div className="empty"><div className="empty-icon">🎫</div><p>Save your flight, train, bus and hotel bookings here — PNR, seat, timings — so everything's in one place.</p></div>}
          {(() => {
            const groups = { onward: [], return: [], other: [] };
            for (const tk of tickets) groups[tk.journey === "onward" ? "onward" : tk.journey === "return" ? "return" : "other"].push(tk);
            const journeyCard = (jkey, label) => {
              const legs = groups[jkey];
              if (!legs.length) return null;
              const first = legs[0], last = legs[legs.length - 1];
              const pending = legs.filter((x) => x.status === "pending").length;
              const noCopy = legs.filter((x) => x.status !== "pending" && !x.archived).length;
              const isOpen = !!openJ[jkey];
              return (
                <div key={jkey}>
                  <button className={"journey-head" + (pending ? " warn-row" : "")} onClick={() => setOpenJ({ ...openJ, [jkey]: !isOpen })}>
                    <span className="feed-icon">🧭</span>
                    <span className="feed-main">
                      <span className="feed-title">{first.from} → {last.to}</span>
                      <span className="feed-sub">{label} · {legs.length} leg{legs.length > 1 ? "s" : ""} via {first.to} · {fmtDate(first.date)}{last.date !== first.date ? " – " + fmtDate(last.date) : ""}</span>
                    </span>
                    {pending > 0
                      ? <span className="badge badge-warn">{pending} to book</span>
                      : noCopy > 0
                        ? <span className="badge badge-amber">📎 {noCopy} pending</span>
                        : <span className="badge badge-ok">All set ✓</span>}
                    <span className="chev">{isOpen ? "▾" : "▸"}</span>
                  </button>
                  {isOpen && legs.map((tk) => (
                    <Ticket key={tk.id} tk={tk} onEdit={() => p.onEditTicket(tk)}
                      onUpload={(file, kind) => p.onUploadImage(tk, file, kind)}
                      onView={(kind) => p.onViewImage(tk, kind)}
                      onRemoveImg={(kind) => p.onRemoveImage(tk, kind)}
                      onCheckFare={() => p.onCheckFare(tk)}
                      onDelete={() => { if (confirm("Delete this ticket?")) p.onDeleteTicket(tk.id); }} />
                  ))}
                </div>
              );
            };
            return (
              <>
                {journeyCard("onward", "Onward")}
                {journeyCard("return", "Return")}
                {groups.other.map((tk) => (
                  <Ticket key={tk.id} tk={tk} onEdit={() => p.onEditTicket(tk)}
                    onUpload={(file, kind) => p.onUploadImage(tk, file, kind)}
                    onView={(kind) => p.onViewImage(tk, kind)}
                    onRemoveImg={(kind) => p.onRemoveImage(tk, kind)}
                    onCheckFare={() => p.onCheckFare(tk)}
                    onDelete={() => { if (confirm("Delete this ticket?")) p.onDeleteTicket(tk.id); }} />
                ))}
              </>
            );
          })()}
        </section>
      )}

      {tab === "desk" && (
        <section>
          <div className="check-add">
            <input type="date" value={officeDate} onChange={(e) => setOfficeDate(e.target.value)} />
            <button className="btn-accent" onClick={() => { p.onAddOfficeWeek(officeDate); setOfficeDate(""); }}>+ Add week</button>
          </div>
          <p className="hint" style={{ marginBottom: 10 }}>Pick any date — the whole working week (Mon–Fri, minus holidays) is added. You book desks for the full week together; preferred seat <b>{p.deskSeat}</b>.</p>
          {officeDays.length === 0 && <div className="empty"><div className="empty-icon">🪑</div><p>Add your office weeks. For each, I'll compute when the desk window opens (Friday night 12, for the week after next) and alert you to book seat {p.deskSeat}.</p></div>}
          {(() => {
            const wkMap = new Map();
            for (const o of officeDays) {
              const mon = mondayOf(o.date);
              if (!wkMap.has(mon)) wkMap.set(mon, []);
              wkMap.get(mon).push(o);
            }
            return [...wkMap.entries()].map(([mon, days]) => {
              const allBooked = days.every((o) => o.booked);
              const open = deskWindowOpenDate(days[0].date);
              const dOpen = daysUntil(open);
              const dayNames = days.map((o) => parseDate(o.date).toLocaleDateString("en-IN", { weekday: "short", day: "numeric" })).join(", ");
              return (
                <div key={mon} className={"feed-row static" + (!allBooked ? " warn-row" : "")}>
                  <span className="feed-icon">🪑</span>
                  <span className="feed-main">
                    <span className="feed-title">Week of {fmtDate(mon)} · seat {p.deskSeat}</span>
                    <span className="feed-sub">{dayNames}</span>
                    <span className="feed-sub">{allBooked ? "Desks booked ✓" : dOpen <= 0 ? "Window OPEN — book the whole week now!" : `Window opens Fri ${fmtDate(open)} night 12`}</span>
                  </span>
                  {!allBooked && dOpen > 0 && <span className="badge">Opens in {dOpen}d</span>}
                  {!allBooked && dOpen <= 0 && <span className="badge badge-hot">Book now!</span>}
                  <button className={"checkbox" + (allBooked ? " done" : "")} onClick={() => p.onToggleDeskWeek(days.map((o) => o.id), !allBooked)}>{allBooked ? "✓" : ""}</button>
                  <button className="x" onClick={() => { if (confirm("Remove this office week?")) p.onDeleteOfficeDays(days.map((o) => o.id)); }}>✕</button>
                </div>
              );
            });
          })()}
          {officeDays.length > 0 && <p className="hint">Tick the box once you've booked the whole week's desks in the office system.</p>}
        </section>
      )}

      {tab === "reminders" && (
        <section>
          <button className="btn-accent full" onClick={p.onAddReminder}>+ Add reminder</button>
          {reminders.length === 0 && <div className="empty"><div className="empty-icon">🔔</div><p>Add things like "Web check-in opens", "Carry passport photocopy", "Confirm hotel". They appear on your home feed with a countdown.</p></div>}
          {reminders.map((r) => (
            <div key={r.id} className="feed-row static">
              <span className="feed-icon">🔔</span>
              <span className="feed-main">
                <span className="feed-title">{r.text}</span>
                <span className="feed-sub">{fmtDate(r.date)}</span>
              </span>
              <Countdown dateStr={r.date} />
              <button className="x" onClick={() => p.onDeleteReminder(r.id)}>✕</button>
            </div>
          ))}
        </section>
      )}

      {tab === "packing" && (
        <section>
          <div className="check-add">
            <input value={checkText} placeholder="Add item — e.g. charger, medicines" onChange={(e) => setCheckText(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { p.onAddCheck(checkText); setCheckText(""); } }} />
            <button className="btn-accent" onClick={() => { p.onAddCheck(checkText); setCheckText(""); }}>Add</button>
          </div>
          {checklist.map((c) => (
            <div key={c.id} className="check-row">
              <button className={"checkbox" + (c.done ? " done" : "")} onClick={() => p.onToggleCheck(c.id)}>{c.done ? "✓" : ""}</button>
              <span className={"check-text" + (c.done ? " done" : "")}>{c.text}</span>
              <button className="x" onClick={() => p.onDeleteCheck(c.id)}>✕</button>
            </div>
          ))}
        </section>
      )}
    </>
  );
}

function Ticket({ tk, onEdit, onDelete, onUpload, onView, onRemoveImg, onCheckFare }) {
  const meta = TYPE_META[tk.type] || TYPE_META.other;
  const fileBtn = (kind, has, labelUp, labelView) => has ? (
    <span className="file-pair">
      <button className="btn-view" onClick={() => onView(kind)}>{labelView}</button>
      <button className="btn-ghost small" style={{ color: "#8a8474" }} onClick={() => onRemoveImg(kind)}>✕</button>
    </span>
  ) : (
    <label className="btn-upload">
      {labelUp}
      <input type="file" accept="image/*,application/pdf" style={{ display: "none" }}
        onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) onUpload(f, kind); e.target.value = ""; }} />
    </label>
  );
  return (
    <div className="ticket">
      <div className="ticket-stub">
        <span className="ticket-icon">{meta.icon}</span>
        <span className="ticket-type">{meta.label}</span>
      </div>
      <div className="ticket-body">
        <div className="ticket-title">{tk.title || meta.label}</div>
        {(tk.from || tk.to) && <div className="ticket-route">{tk.from}{tk.from && tk.to ? " → " : ""}{tk.to}</div>}
        <div className="ticket-grid">
          {tk.date && <div><label>Date</label><span>{fmtDate(tk.date)}</span></div>}
          {tk.time && <div><label>Time</label><span>{fmtTime(tk.time)}</span></div>}
          {tk.ref && <div><label>PNR / Ref</label><span>{tk.ref}</span></div>}
          {tk.seat && <div><label>Seat / Room</label><span>{tk.seat}</span></div>}
          {tk.fileRef && <div><label>Copy saved at</label><span>{tk.fileRef}</span></div>}
        </div>
        {tk.notes && <div className="ticket-notes">{tk.notes}</div>}
        <div className="ticket-file">
          {fileBtn("tkimg", tk.img, "📎 Upload ticket", "🎫 View ticket")}
          {tk.type === "flight" && fileBtn("bp", tk.bpImg, "🛂 Upload boarding pass", "🛂 Boarding pass")}
          {tk.status === "pending" && <button className="btn-upload" onClick={onCheckFare}>💹 Check fares</button>}
        </div>
        <div className="ticket-actions">
          {tk.status === "pending" && <span className="badge badge-warn">Not booked yet</span>}
          {tk.status !== "pending" && (tk.archived
            ? <span className="badge badge-ok">📎 Saved</span>
            : <span className="badge badge-amber">📎 No copy</span>)}
          <Countdown dateStr={tk.date} />
          <span className="spacer" />
          <button className="btn-ghost small" onClick={onEdit}>Edit</button>
          <button className="btn-ghost small danger" onClick={onDelete}>Delete</button>
        </div>
      </div>
    </div>
  );
}

        <button className={"type-chip" + (f.journey !== "onward" && f.journey !== "return" ? " on" : "")} onClick={() => setF({ ...f, journey: "" })}>Standalone</button>
      </div>
      <label className="fl">Booking status</label>
      <div className="type-picker">
        <button className={"type-chip" + (f.status !== "pending" ? " on" : "")} onClick={() => setF({ ...f, status: "booked" })}>✓ Booked</button>
        <button className={"type-chip" + (f.status === "pending" ? " on" : "")} onClick={() => setF({ ...f, status: "pending" })}>⏳ Not booked yet</button>
      </div>
      {f.status === "pending" && (
        <>
          <label className="fl">Booking window opens on (optional)</label>
          <input type="date" value={f.bookOpen} onChange={set("bookOpen")} />
          <p className="hint">This ticket stays in the "To book" list on your home screen. On this date it turns into a red "Book now!" alert.</p>
        </>
      )}
      {f.status !== "pending" && (
        <>
          <label className="fl">Ticket copy saved? (screenshot / PDF / email)</label>
          <div className="type-picker">
            <button className={"type-chip" + (f.archived ? " on" : "")} onClick={() => setF({ ...f, archived: true })}>📎 Copy saved</button>
            <button className={"type-chip" + (!f.archived ? " on" : "")} onClick={() => setF({ ...f, archived: false })}>Not saved yet</button>
          </div>
          {f.archived && (
            <>
              <label className="fl">Where is it saved?</label>
              <input value={f.fileRef} onChange={set("fileRef")} placeholder="e.g. Google Drive › Travel, Gmail, phone gallery" />
            </>
          )}
        </>
      )}
      <label className="fl">Notes</label>
      <textarea rows={2} value={f.notes} onChange={set("notes")} placeholder="Terminal, gate, baggage, contact number…" />
      <button className="btn-accent full" disabled={!f.title.trim()} onClick={() => onSave(f)}>
        {edit ? "Save changes" : "Save ticket"}
      </button>
    </Modal>
  );
}

function PlanForm({ mon, onSave, onClose }) {
  const [f, setF] = useState({ out: mon, back: shiftDays(mon, 9) });
  return (
    <Modal title="Plan a BLR trip" onClose={onClose}>
      <div className="two">
        <div><label className="fl">Travel out (BHL → AHM)</label><input type="date" value={f.out} onChange={(e) => setF({ ...f, out: e.target.value })} /></div>
        <div><label className="fl">Return (back in BHL)</label><input type="date" value={f.back} onChange={(e) => setF({ ...f, back: e.target.value })} /></div>
      </div>
      <p className="hint">Creates all 4 legs (bus + flight each way, pending, with book-by alarms: flights ~30 days ahead, buses ~15) and 3 office days (Tue–Thu) in every week of your stay — holidays skipped. You can adjust everything afterwards.</p>
      <button className="btn-accent full" disabled={!f.out || !f.back} onClick={() => onSave(f.out, f.back)}>Create trip</button>
    </Modal>
  );
}

function ReminderForm({ onSave, onClose }) {
  const [f, setF] = useState({ text: "", date: todayStr() });
  return (
    <Modal title="Add reminder" onClose={onClose}>
      <label className="fl">What should I remind you about? *</label>
      <input value={f.text} onChange={(e) => setF({ ...f, text: e.target.value })} placeholder="e.g. Web check-in opens" />
      <label className="fl">On which date</label>
      <input type="date" value={f.date} onChange={(e) => setF({ ...f, date: e.target.value })} />
      <p className="hint">Reminders show on your home screen with a countdown whenever you open the app.</p>
      <button className="btn-accent full" disabled={!f.text.trim()} onClick={() => onSave(f)}>Save reminder</button>
    </Modal>
  );
}
