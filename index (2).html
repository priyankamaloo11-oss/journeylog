<script>
// Persistent storage backed by IndexedDB (no size worries for ticket images)
const __dbp = new Promise((res, rej) => {
  const r = indexedDB.open("journeylog", 1);
  r.onupgradeneeded = () => r.result.createObjectStore("kv");
  r.onsuccess = () => res(r.result);
  r.onerror = () => rej(r.error);
});
function __tx(mode, fn) {
  return __dbp.then((db) => new Promise((res, rej) => {
    const t = db.transaction("kv", mode);
    const req = fn(t.objectStore("kv"));
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}
window.storage = {
  async get(key) {
    const v = await __tx("readonly", (s) => s.get(key));
    if (v === undefined) throw new Error("not found");
    return { key, value: v };
  },
  async set(key, value) { await __tx("readwrite", (s) => s.put(value, key)); return { key, value }; },
  async delete(key) { await __tx("readwrite", (s) => s.delete(key)); return { key, deleted: true }; },
  async list(prefix) {
    const keys = await __tx("readonly", (s) => s.getAllKeys());
    return { keys: keys.filter((k) => !prefix || String(k).startsWith(prefix)) };
  },
};
// Fix: ask Android/Chrome to protect this app's data from auto-cleanup
if (navigator.storage && navigator.storage.persist) {
  window.addEventListener("load", () => { navigator.storage.persist().catch(() => {}); });
}
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
}
</script>

      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
      :root {
        --bg: #101828; --card: #1a2438; --line: #27324a;
        --text: #eef2fa; --mut: #94a0b8;
        --accent: #f5a524; --accent-ink: #241a05;
        --paper: #f8f4ea; --paper-ink: #23201a; --paper-mut: #6f6a5d;
        --danger: #ff7a7a;
        /* --photo is defined in the head style block */
      }
      .masthead-photo { height: 170px; border-radius: 16px; border: 1px solid var(--line); margin-top: 12px;
        background: var(--photo) center 22% / cover no-repeat; box-shadow: 0 6px 24px rgba(0,0,0,0.35); }
      * { box-sizing: border-box; margin: 0; }
      .app {
        min-height: 100vh; color: var(--text);
        background:
          radial-gradient(1100px 480px at 85% -8%, rgba(245,165,36,0.09), transparent 60%),
          radial-gradient(900px 520px at -12% 108%, rgba(127,184,255,0.07), transparent 60%),
          linear-gradient(rgba(16,24,40,0.90), rgba(16,24,40,0.96)),
          var(--photo) center 18% / cover no-repeat fixed,
          var(--bg);
        font-family: 'IBM Plex Sans', system-ui, sans-serif;
        max-width: 460px; margin: 0 auto; padding: 16px 16px 48px;
      }
      h1, h2, h3, .trip-name, .ticket-title { font-family: 'Space Grotesk', system-ui, sans-serif; }
      .loading { padding: 60px 0; text-align: center; color: var(--mut); }
      .today-card { background: linear-gradient(135deg, #2a3453, #1c2542); border: 1px solid var(--accent);
        border-radius: 16px; padding: 14px; margin-bottom: 14px; box-shadow: 0 6px 22px rgba(245,165,36,0.10); }
      .today-title { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 17px; font-weight: 700; }
      .today-leg { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 10px 12px; margin-top: 10px; }
      .today-leg .btn-view { white-space: nowrap; }
      .hint-warn { color: #f0b458 !important; font-weight: 600; }
      .hint-ok { color: #8fd8a8 !important; }
      .saved-toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: 20px; z-index: 80;
        background: #17301f; color: #9fe8b8; border: 1px solid #2e5c40; padding: 6px 16px; border-radius: 999px;
        font-size: 13px; font-weight: 600; pointer-events: none; animation: toastfade 1.8s ease forwards; }
      @keyframes toastfade { 0% { opacity: 0; transform: translate(-50%, 8px); } 12% { opacity: 1; transform: translate(-50%, 0); }
        75% { opacity: 1; } 100% { opacity: 0; } }
      .save-warn { background: #3a2020; color: #ffb4b4; border: 1px solid #5c3030; padding: 8px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 12px; }

      .masthead { padding: 8px 0 18px; }
      .eyebrow { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--mut); margin-bottom: 4px; }
      .route-line { font-size: 11px; letter-spacing: .08em; color: var(--mut); margin-top: 6px; opacity: .8; }
      h1 { font-size: 30px; letter-spacing: -0.02em; }
      .accent { color: var(--accent); }

      section { margin-bottom: 26px; }
      .section-label { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--mut); margin-bottom: 10px; }
      .section-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      .section-row .section-label { margin: 0; }

      .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: var(--line); color: var(--mut); white-space: nowrap; }
      .badge-hot { background: var(--accent); color: var(--accent-ink); }

      .feed-row { display: flex; gap: 10px; align-items: center; width: 100%; text-align: left;
        background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; color: var(--text); cursor: pointer; }
      .feed-row.static { cursor: default; }
      .feed-icon { font-size: 18px; }
      .feed-main { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
      .feed-title { font-weight: 600; font-size: 14px; }
      .feed-sub { font-size: 12px; color: var(--mut); }

      .trip-card { display: block; width: 100%; text-align: left; background: var(--card); border: 1px solid var(--line);
        border-radius: 14px; padding: 14px; margin-bottom: 10px; color: var(--text); cursor: pointer; }
      .trip-card.muted { opacity: .55; }
      .trip-card-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      .trip-name { font-size: 17px; font-weight: 700; }
      .trip-meta { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 13px; color: var(--mut); margin-top: 6px; }

      .empty { text-align: center; color: var(--mut); padding: 26px 18px; border: 1px dashed var(--line); border-radius: 14px; font-size: 14px; line-height: 1.5; }
      .empty-icon { font-size: 28px; margin-bottom: 8px; }

      .btn-accent { background: var(--accent); color: var(--accent-ink); border: none; border-radius: 10px;
        padding: 9px 14px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }
      .btn-accent:disabled { opacity: .4; cursor: default; }
      .btn-accent.full { width: 100%; padding: 12px; margin-bottom: 12px; }
      .btn-ghost { background: none; border: none; color: var(--mut); font-size: 14px; cursor: pointer; padding: 6px 8px; font-family: inherit; }
      .btn-ghost.small { font-size: 13px; }
      .btn-ghost.danger, .x.danger { color: var(--danger); }
      .x { background: none; border: none; color: var(--mut); cursor: pointer; font-size: 14px; padding: 4px 6px; }

      .trip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
      .trip-header-actions { display: flex; gap: 4px; }
      .trip-hero h2 { font-size: 24px; letter-spacing: -0.02em; }
      .trip-hero { margin-bottom: 16px; }
      .trip-notes { font-size: 13px; color: var(--mut); margin-top: 8px; line-height: 1.5; }

      .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
      .tab { flex: 1; background: var(--card); border: 1px solid var(--line); color: var(--mut);
        border-radius: 10px; padding: 9px 4px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
      .tab.on { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

      /* Boarding-pass ticket */
      .ticket { display: flex; background: var(--paper); color: var(--paper-ink); border-radius: 14px;
        margin-bottom: 14px; position: relative; overflow: hidden; }
      .ticket-stub { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
        width: 74px; border-right: 2px dashed #cfc8b6; padding: 12px 6px; flex-shrink: 0; }
      .ticket-icon { font-size: 22px; }
      .ticket-type { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--paper-mut); font-weight: 600; }
      .ticket::before, .ticket::after { content: ""; position: absolute; width: 16px; height: 16px; border-radius: 50%;
        background: var(--bg); left: 66px; }
      .ticket::before { top: -8px; } .ticket::after { bottom: -8px; }
      .ticket-body { padding: 12px 14px; flex: 1; min-width: 0; }
      .ticket-title { font-size: 15px; font-weight: 700; }
      .ticket-route { font-size: 13px; color: var(--paper-mut); margin-top: 2px; font-weight: 600; }
      .ticket-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; margin-top: 10px; }
      .ticket-grid label { display: block; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--paper-mut); }
      .ticket-grid span { font-size: 13px; font-weight: 600; }
      .ticket-notes { font-size: 12px; color: var(--paper-mut); margin-top: 10px; line-height: 1.4; }

      }
      if (!d.settings) d = { ...d, settings: { deskSeat: "233" } };
      // Journey grouping + friendly trip names
      const ONWARD_IDS = ["s1a", "s1b", "s2a", "s2b"];
      const RETURN_IDS = ["s1c", "s1d", "s2c", "s2d"];
      let jFixed = false;
      d = { ...d, trips: d.trips.map((t) => {
        let name = t.name;
        if (t.id === "seed-blr-1" && /Trip 1/i.test(name)) name = "BLR: 27 Jul – 5 Aug";
        if (t.id === "seed-blr-2" && /Trip 2/i.test(name)) name = "BLR: 11 – 19 Aug";
        let changed = name !== t.name;
        const tickets = (t.tickets || []).map((tk) => {
          if (tk.journey) return tk;
          const j = ONWARD_IDS.includes(tk.id) ? "onward" : RETURN_IDS.includes(tk.id) ? "return" : "";
          if (!j) return tk;
          changed = true;
          return { ...tk, journey: j };
        });
        if (changed) { jFixed = true; return { ...t, name, tickets }; }
        return t;
      }) };
      if (jFixed) {
        try { await window.storage.set(KEY, JSON.stringify(d)); } catch (e) { /* retry next open */ }
      }
      setData(d);
      setLoaded(true);
    })();
  }, []);

  async function persist(next) {
    setData(next);
    try {
      const res = await window.storage.set(KEY, JSON.stringify(next));
      setSaveErr(!res);
      if (res) setSavedTick(Date.now());
    } catch (e) {
      setSaveErr(true);
    }
  }

  const trips = useMemo(
    () => [...data.trips].sort((a, b) => (a.start || "9999").localeCompare(b.start || "9999")),
    [data.trips]
  );
  const activeTrip = screen.name === "trip" ? data.trips.find((t) => t.id === screen.tripId) : null;

  // ---------- Upcoming feed ----------
  const feed = useMemo(() => {
    const items = [];
    for (const t of data.trips) {
      if (t.planOnly && t.start) items.push({ date: t.start, icon: "🧳", title: `${t.name} begins`, sub: t.destination, tripId: t.id });
      const jmap = {};
      for (const tk of t.tickets || []) {
        if (!tk.date) continue;
        const j = tk.journey === "onward" || tk.journey === "return" ? tk.journey : "leg:" + tk.id;
        (jmap[j] = jmap[j] || []).push(tk);
      }
      for (const key of Object.keys(jmap)) {
        const legs = jmap[key].sort((a, b) => ((a.date || "") + (a.time || "")).localeCompare((b.date || "") + (b.time || "")));
        const first = legs[0], last = legs[legs.length - 1];
        const single = key.indexOf("leg:") === 0;
        items.push({
          date: first.date, time: first.time,
          icon: single ? (TYPE_META[first.type]?.icon || "🎫") : "🧭",
          title: single ? (first.title || TYPE_META[first.type]?.label) : `${key === "onward" ? "Onward" : "Return"}: ${first.from} → ${last.to}`,
          sub: t.name, tripId: t.id,
        });
      }
      for (const r of t.reminders || []) {
        if (r.date) items.push({ date: r.date, icon: "🔔", title: r.text, sub: t.name, tripId: t.id });
      }
    }
    return items
      .filter((i) => { const d = daysUntil(i.date); return d !== null && d >= 0; })
      .sort((a, b) => (a.date + (a.time || "")).localeCompare(b.date + (b.time || "")))
      .slice(0, 6);
  }, [data.trips]);

  // ---------- Mutations ----------
  function saveTrip(form, editId) {
    const next = { ...data };
    if (editId) {
      next.trips = next.trips.map((t) => (t.id === editId ? { ...t, ...form } : t));
    } else {
      next.trips = [...next.trips, { id: uid(), tickets: [], reminders: [], checklist: [], ...form }];
    }
    persist(next);
    setModal(null);
  }
  function deleteTrip(id) {
    persist({ ...data, trips: data.trips.filter((t) => t.id !== id) });
    setScreen({ name: "home" });
  }
  function saveTicket(tripId, form, editId) {
    const next = { ...data, trips: data.trips.map((t) => {
      if (t.id !== tripId) return t;
      const tickets = editId
        ? t.tickets.map((tk) => (tk.id === editId ? { ...tk, ...form } : tk))
        : [...(t.tickets || []), { id: uid(), ...form }];
      return { ...t, tickets };
    })};
    persist(next);
    setModal(null);
  }
  function deleteTicket(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, tickets: t.tickets.filter((tk) => tk.id !== id) } : t) });
  }
  function saveReminder(tripId, form) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, reminders: [...(t.reminders || []), { id: uid(), ...form }] } : t) });
    setModal(null);
  }
  function deleteReminder(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, reminders: t.reminders.filter((r) => r.id !== id) } : t) });
  }
  function addOfficeDay(tripId, date) {
    if (!date) return;
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, officeDays: [...(t.officeDays || []), { id: uid(), date, booked: false }] } : t) });
  }
  function toggleDesk(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, officeDays: t.officeDays.map((o) => (o.id === id ? { ...o, booked: !o.booked } : o)) } : t) });
  }
  function deleteOfficeDay(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, officeDays: t.officeDays.filter((o) => o.id !== id) } : t) });
  }
  function duplicateTrip(id) {
    const t = data.trips.find((x) => x.id === id);
    if (!t) return;
    const copy = {
      ...t, id: uid(), name: t.name + " (copy)",
      start: shiftDays(t.start, 7), end: shiftDays(t.end, 7),
      tickets: (t.tickets || []).map((tk) => ({ ...tk, id: uid(), date: shiftDays(tk.date, 7), status: "pending", archived: false, ref: "", bookOpen: "", img: false, bpImg: false })),
      officeDays: (t.officeDays || []).map((o) => ({ ...o, id: uid(), date: shiftDays(o.date, 7), booked: false })),
      reminders: (t.reminders || []).map((r) => ({ ...r, id: uid(), date: shiftDays(r.date, 7) })),
      checklist: (t.checklist || []).map((c) => ({ ...c, id: uid(), done: false })),
    };
    persist({ ...data, trips: [...data.trips, copy] });
    setScreen({ name: "home" });
  }
  function addCheckItem(tripId, text) {
    if (!text.trim()) return;
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, checklist: [...(t.checklist || []), { id: uid(), text: text.trim(), done: false }] } : t) });
  }
  function toggleCheck(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, checklist: t.checklist.map((c) => (c.id === id ? { ...c, done: !c.done } : c)) } : t) });
  }
  function deleteCheck(tripId, id) {
    persist({ ...data, trips: data.trips.map((t) =>
      t.id === tripId ? { ...t, checklist: t.checklist.filter((c) => c.id !== id) } : t) });
  }

  if (!loaded) return <div className="app"><Style /><div className="loading">Opening your travel desk…</div></div>;

  return (
    <div className="app">
      <Style />
      {saveErr && <div className="save-warn">Couldn't save just now — your last change may not persist. Try again.</div>}
      {savedTick > 0 && <div className="saved-toast" key={savedTick}>✓ Saved on this phone</div>}

      {screen.name === "home" && (
        <HomeScreen
          trips={trips} feed={feed}
          openTrip={(id) => setScreen({ name: "trip", tripId: id, tab: "tickets" })}
          onAddTrip={() => setModal({ kind: "trip" })}
          calSynced={data.calSynced || []} calStatus={calStatus} calLog={data.calLog || []}
          onViewTicketImage={(tk, kind) => openTicketImage(tk, kind)}
          onUploadTicketImage={(tk, file, kind) => uploadTicketImage(tk.tripId, tk, file, kind)}
          onSyncCalendar={(events) => syncCalendar(events)}
          onPlanWeek={(mon) => setModal({ kind: "plan", mon })}
          deskSeat={(data.settings && data.settings.deskSeat) || "233"}
        />
      )}

      {fareView && (
        <div className="overlay img-overlay" onClick={() => setFareView(null)}>
          <div className="sheet fare-sheet" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-head">
              <h3>💹 {fareView.title}</h3>
              <button className="x" onClick={() => setFareView(null)}>✕</button>
            </div>
            <p className="fare-text">{fareView.text}</p>
            <p className="hint">Fares from a live web search — approximate. Verify on the booking site before paying.</p>
          </div>
        </div>
      )}

      {screen.name === "trip" && activeTrip && (
        <TripScreen
          trip={activeTrip} tab={screen.tab || "tickets"}
          setTab={(tab) => setScreen({ ...screen, tab })}
          back={() => setScreen({ name: "home" })}
          onEdit={() => setModal({ kind: "trip", edit: activeTrip })}
          onDelete={() => { if (confirm(`Delete "${activeTrip.name}" and everything in it?`)) deleteTrip(activeTrip.id); }}
          onAddTicket={() => setModal({ kind: "ticket", tripId: activeTrip.id })}
          onEditTicket={(tk) => setModal({ kind: "ticket", tripId: activeTrip.id, edit: tk })}
          onDeleteTicket={(id) => deleteTicket(activeTrip.id, id)}
          onAddReminder={() => setModal({ kind: "reminder", tripId: activeTrip.id })}
          onDeleteReminder={(id) => deleteReminder(activeTrip.id, id)}
          onAddCheck={(text) => addCheckItem(activeTrip.id, text)}
          onToggleCheck={(id) => toggleCheck(activeTrip.id, id)}
          onDeleteCheck={(id) => deleteCheck(activeTrip.id, id)}
          onAddOfficeDay={(date) => addOfficeDay(activeTrip.id, date)}
          onToggleDesk={(id) => toggleDesk(activeTrip.id, id)}
          onDeleteOfficeDay={(id) => deleteOfficeDay(activeTrip.id, id)}
          onDuplicate={() => { if (confirm("Copy this trip to next week? Dates shift by 7 days; tickets and desks reset to 'not booked'.")) duplicateTrip(activeTrip.id); }}
          onUploadImage={(tk, file, kind) => uploadTicketImage(activeTrip.id, tk, file, kind)}
          onViewImage={(tk, kind) => openTicketImage(tk, kind)}
          onRemoveImage={(tk, kind) => { if (confirm("Remove this saved image?")) removeTicketImage(activeTrip.id, tk, kind); }}
          onCheckFare={(tk) => checkFare(tk)}
          onToggleDeskWeek={(ids, value) => toggleDeskWeek(activeTrip.id, ids, value)}
          onDeleteOfficeDays={(ids) => deleteOfficeDays(activeTrip.id, ids)}
          onAddOfficeWeek={(ds) => addOfficeWeek(activeTrip.id, ds)}
          deskSeat={(data.settings && data.settings.deskSeat) || "233"}
        />
      )}

      {sharedFile && (
        <div className="overlay" onClick={() => setSharedFile(null)}>
          <div className="sheet" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-head">
              <h3>📥 Ticket received — attach to which journey?</h3>
              <button className="x" onClick={() => setSharedFile(null)}>✕</button>
            </div>
            {data.trips.flatMap((t) => (t.tickets || [])
              .filter((tk) => !tk.date || daysUntil(tk.date) >= -1)
              .map((tk) => (
                <button key={tk.id} className="feed-row" onClick={() => attachShared(t.id, tk)}>
                  <span className="feed-icon">{TYPE_META[tk.type]?.icon || "🎫"}</span>
                  <span className="feed-main">
                    <span className="feed-title">{tk.title}</span>
                    <span className="feed-sub">{t.name}{tk.date ? " · " + fmtDate(tk.date) : ""}</span>
                  </span>
                </button>
              )))}
            <p className="hint">The file will be saved as that ticket's copy and marked 📎 archived.</p>
          </div>
        </div>
      )}

      {viewImg && (
        <div className="overlay img-overlay" onClick={() => setViewImg(null)}>
          <div className="img-sheet" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-head">
              <h3 className="img-title">{viewImg.title}</h3>
              <button className="x" onClick={() => setViewImg(null)}>✕</button>
            </div>
            <img src={viewImg.src} alt="Ticket" className="ticket-img" />
          </div>
        </div>
      )}

      {modal?.kind === "trip" && (
        <TripForm edit={modal.edit} onClose={() => setModal(null)}
          onSave={(form) => saveTrip(form, modal.edit?.id)} />
      )}
      {modal?.kind === "ticket" && (
        <TicketForm edit={modal.edit} onClose={() => setModal(null)}
          onSave={(form) => saveTicket(modal.tripId, form, modal.edit?.id)} />
      )}
      {modal?.kind === "plan" && (
        <PlanForm mon={modal.mon} onClose={() => setModal(null)}
          onSave={(out, back) => createPlannedTrip(out, back)} />
      )}
      {modal?.kind === "reminder" && (
        <ReminderForm onClose={() => setModal(null)}
          onSave={(form) => saveReminder(modal.tripId, form)} />
      )}
    </div>
  );
}

/* ---------------- Screens ---------------- */

function HomeScreen({ trips, feed, openTrip, onAddTrip, calSynced, calStatus, calLog, onSyncCalendar, onPlanWeek, deskSeat, onViewTicketImage, onUploadTicketImage }) {
  const [view, setView] = useState("list");
  const upcoming = trips.filter((t) => !t.end || daysUntil(t.end) >= 0);
  const past = trips.filter((t) => t.end && daysUntil(t.end) < 0);

  const toBook = [];
  const toArchive = [];
  const desksToBook = [];
  for (const t of trips) {
    for (const tk of t.tickets || []) {
      const future = !tk.date || daysUntil(tk.date) >= 0;
      if (tk.status === "pending" && future) toBook.push({ ...tk, tripName: t.name, tripId: t.id });
      else if (tk.status !== "pending" && !tk.archived && future) toArchive.push({ ...tk, tripName: t.name, tripId: t.id });
    }
    for (const o of t.officeDays || []) {
      if (!o.booked && daysUntil(o.date) >= 0) desksToBook.push({ ...o, tripName: t.name, tripId: t.id, open: deskWindowOpenDate(o.date) });
    }
  }
  toBook.sort((a, b) => (a.bookOpen || a.date || "").localeCompare(b.bookOpen || b.date || ""));
  toArchive.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  desksToBook.sort((a, b) => a.open.localeCompare(b.open) || a.date.localeCompare(b.date));

  // Alarm events for Google Calendar: one per desk window + one per pending ticket
  const calEvents = [];
  const winMap = new Map();
  for (const o of desksToBook) {
    if (!winMap.has(o.open)) winMap.set(o.open, []);
    winMap.get(o.open).push(o.date);
  }
  for (const [open, dates] of winMap) {
    const key = "desk:" + open;
    if (!calSynced.includes(key) && daysUntil(open) >= 0) {
      calEvents.push({ key, title: `🪑 Desk window opens at 12 — book seat ${deskSeat} NOW for ${dates.map((x) => fmtDate(x)).join(", ")}`, date: open, time: "23:55" });
    }
  }
  for (const tk of toBook) {
    const key = "ticket:" + tk.id;
    const evDate = tk.bookOpen || shiftDays(tk.date, -5);
    if (!calSynced.includes(key) && daysUntil(evDate) >= 0) {
      calEvents.push({ key, title: `🎫 Book ${tk.title} ticket (travel on ${fmtDate(tk.date)})`, date: evDate, time: "09:00" });
    }
  }
  // Plan each trip one month in advance
  for (const t of trips) {
    if (!t.start) continue;
    const key = "plan:" + t.id;
    const evDate = shiftDays(t.start, -30);
    if (!calSynced.includes(key) && daysUntil(evDate) >= 0 && daysUntil(t.start) >= 0) {
      calEvents.push({ key, title: `🧳 1 month to go — plan ${t.name}: create the trip, check fares & book early`, date: evDate, time: "09:00" });
    }
  }
  // Web check-in alarms for booked flights: 48h and 24h before departure
  for (const t of trips) {
    for (const tk of t.tickets || []) {
      if (tk.type !== "flight" || tk.status === "pending" || !tk.date) continue;
      const depTime = tk.time || "12:00";
      for (const [hrs, pre, label] of [[48, "ci48:", "48 hr"], [24, "ci24:", "24 hr"]]) {
        const key = pre + tk.id;
        const ev = shiftDateTimeHours(tk.date, depTime, -hrs);
        if (!calSynced.includes(key) && daysUntil(ev.date) >= 0) {
          calEvents.push({ key, title: `🛂 Web check-in (${label} window) — ${tk.title}, departs ${fmtDate(tk.date)}${tk.time ? " " + fmtTime(tk.time) : ""}`, date: ev.date, time: ev.time });
        }
      }
    }
  }
  // Upload the ticket copy if still missing (2 days before travel)
  for (const tk of toArchive) {
    if (!tk.date) continue;
    const key = "upload:" + tk.id;
    let evDate = shiftDays(tk.date, -2);
    if (daysUntil(evDate) < 0) evDate = dsOf(new Date());
    if (!calSynced.includes(key) && daysUntil(tk.date) >= 0) {
      calEvents.push({ key, title: `📎 Upload your ${tk.title} ticket copy into AviYatra`, date: evDate, time: "10:00" });
    }
  }

  // Travel-day mode: all legs departing today, in time order
  const todayLegs = [];
  for (const t of trips) {
    for (const tk of t.tickets || []) {
      if (tk.date === todayStr()) todayLegs.push({ ...tk, tripName: t.name, tripId: t.id });
    }
  }
  todayLegs.sort((a, b) => (a.time || "99").localeCompare(b.time || "99"));


  // Week-grouped desk alerts
  const deskWeeks = new Map();
  for (const o of desksToBook) {
    const wk = o.tripId + "|" + mondayOf(o.date);
    if (!deskWeeks.has(wk)) deskWeeks.set(wk, { mon: mondayOf(o.date), open: o.open, tripName: o.tripName, tripId: o.tripId, days: [] });
    deskWeeks.get(wk).days.push(o.date);
  }
  const deskWeekRows = [...deskWeeks.values()].sort((a, b) => a.open.localeCompare(b.open));

  return (
    <>
      <header className="masthead">
        <div className="eyebrow">✈ Your travel desk</div>
        <h1>Avi<span className="accent">Yatra</span></h1>
        <div className="route-line">BHL ─·─── AHM ───·─ BLR</div>
        <div className="masthead-photo"></div>
      </header>

      <nav className="tabs">
        <button className={"tab" + (view === "list" ? " on" : "")} onClick={() => setView("list")}>🧳 Trips</button>
        <button className={"tab" + (view === "calendar" ? " on" : "")} onClick={() => setView("calendar")}>📅 Calendar</button>
        <button className={"tab" + (view === "plan" ? " on" : "")} onClick={() => setView("plan")}>🗓️ Plan</button>
      </nav>

      {view === "list" && todayLegs.length > 0 && (
        <div className="today-card">
          <div className="today-title">🧳 Travelling today — safe journey!</div>
          {todayLegs.map((tk) => (
            <div className="today-leg" key={tk.id}>
              <span className="feed-icon">{TYPE_META[tk.type]?.icon || "🎫"}</span>
              <span className="feed-main">
                <span className="feed-title">{tk.title}{tk.time ? " · " + fmtTime(tk.time) : ""}</span>
                <span className="feed-sub">{[tk.ref ? "PNR " + tk.ref : "", tk.seat ? "Seat " + tk.seat : ""].filter(Boolean).join(" · ") || tk.tripName}</span>
              </span>
              {tk.img
                ? <button className="btn-view" onClick={() => onViewTicketImage(tk, "tkimg")}>🎫 Ticket</button>
                : tk.status !== "pending" && (
                  <label className="btn-upload">📎 Add ticket
                    <input type="file" accept="image/*,application/pdf" style={{ display: "none" }}
                      onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) onUploadTicketImage(tk, f, "tkimg"); e.target.value = ""; }} />
                  </label>
                )}
              {tk.type === "flight" && (tk.bpImg
                ? <button className="btn-view" onClick={() => onViewTicketImage(tk, "bp")}>🛂 Pass</button>
                : tk.status !== "pending" && (
                  <label className="btn-upload">🛂 Add pass
                    <input type="file" accept="image/*,application/pdf" style={{ display: "none" }}
                      onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) onUploadTicketImage(tk, f, "bp"); e.target.value = ""; }} />
                  </label>
                ))}
              {tk.status === "pending" && <span className="badge badge-warn">Not booked!</span>}
            </div>
          ))}
        </div>
      )}

      {view === "calendar" && <CalendarView trips={trips} openTrip={openTrip} />}

      {view === "plan" && <PlanView trips={trips} openTrip={openTrip} onPlanWeek={onPlanWeek} />}

      {view === "list" && calEvents.length > 0 && (
        <section>
          <button className="btn-accent full" disabled={calStatus === "working"} onClick={() => onSyncCalendar(calEvents)}>
            {`🔔 Download ${calEvents.length} alarm${calEvents.length > 1 ? "s" : ""} for Google Calendar`}
          </button>
          {calStatus === "done" && <p className="hint">✓ Alarm file downloaded — now tap it in your notification bar (aviyatra-alarms.ics) and Google Calendar will add the events.</p>}
          {calStatus === "error" && <p className="hint">Couldn't create the alarm file — please try again.</p>}
          {calLog.length > 0 && (
            <p className="hint">Last export: {fmtDate(calLog[calLog.length - 1].when.slice(0, 10))} · {calLog[calLog.length - 1].count} alarm{calLog[calLog.length - 1].count > 1 ? "s" : ""} · {calSynced.length} exported in total. Verify anytime: open Google Calendar and look for the 🪑 🎫 🧳 📎 events.</p>
          )}
        </section>
      )}
      {view === "list" && calEvents.length === 0 && calSynced.length > 0 && (
        <section>
          <p className="hint">🔔 Calendar up to date — all {calSynced.length} alarm{calSynced.length > 1 ? "s" : ""} already exported to Google Calendar. New alarms will appear here when new desks, tickets or trips need them.</p>
        </section>
      )}

      {view === "list" && (
        <div className="panel">
          <div className="panel-title">🪑 Desk Booking</div>
          {deskWeekRows.length === 0 && <p className="hint">All office desks booked ✓</p>}
          {deskWeekRows.map((w) => {
            const dOpen = daysUntil(w.open);
            return (
              <button key={w.tripId + w.mon} className={"feed-row" + (dOpen <= 0 ? " warn-row" : "")} onClick={() => openTrip(w.tripId)}>
                <span className="feed-icon">🪑</span>
                <span className="feed-main">
                  <span className="feed-title">Week of {fmtDate(w.mon)} · seat {deskSeat}</span>
                  <span className="feed-sub">{w.days.length} day{w.days.length > 1 ? "s" : ""} · {w.tripName}{dOpen > 0 ? " · opens Fri " + fmtDate(w.open) + " night 12" : " · window open — book the full week"}</span>
                </span>
                {dOpen <= 0
                  ? <span className="badge badge-hot">Book now!</span>
                  : <span className="badge">Opens in {dOpen}d</span>}
              </button>
            );

function BackupPanel() {
  const [protectedOn, setProtectedOn] = useState(null);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);
  const [lastBackup, setLastBackup] = useState(undefined); // undefined = loading, null = never

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("meta:lastBackup");
        setLastBackup(r && r.value ? r.value : null);
      } catch (e) { setLastBackup(null); }
    })();
  }, []);

  useEffect(() => {
    (async () => {
      try {
        if (navigator.storage && navigator.storage.persisted) {
          let ok = await navigator.storage.persisted();
          if (!ok && navigator.storage.persist) ok = await navigator.storage.persist();
          setProtectedOn(!!ok);
        } else setProtectedOn(false);
      } catch (e) { setProtectedOn(false); }
    })();
  }, []);

  async function exportBackup() {
    setBusy(true); setMsg(null);
    try {
      const { keys } = await window.storage.list();
      const entries = {};
      let count = 0;
      for (const k of keys) {
        if (k === "__shared") continue; // transient WhatsApp-share handoff, not user data
        try {
          const r = await window.storage.get(k);
          if (typeof r.value === "string") { entries[k] = r.value; count++; }
        } catch (e) { /* skip unreadable key */ }
      }
      if (!count) throw new Error("nothing to back up");
      const payload = { app: "aviyatra-backup", version: 1, exported: new Date().toISOString(), entries };
      const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const d = new Date();
      a.href = url;
      a.download = "aviyatra-backup-" + d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0") + ".json";
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      const stamp = new Date().toISOString();
      try { await window.storage.set("meta:lastBackup", stamp); setLastBackup(stamp); } catch (e) { /* non-fatal */ }
      setMsg("✓ Backup downloaded (" + count + " items, ticket images included). Save the file to Google Drive, or WhatsApp it to yourself.");
    } catch (e) {
      setMsg("Couldn't create the backup — please try again.");
    }
    setBusy(false);
  }

  async function importBackup(file) {
    if (!file) return;
    setBusy(true); setMsg(null);
    try {
      const text = await file.text();
      const payload = JSON.parse(text);
      if (!payload || payload.app !== "aviyatra-backup" || !payload.entries) throw new Error("bad file");
      const keys = Object.keys(payload.entries);
      if (!keys.length) throw new Error("empty");
      const when = payload.exported ? payload.exported.slice(0, 10) : "an unknown date";
      if (!confirm("Restore the backup from " + when + "? Current data will be replaced by the " + keys.length + " saved items.")) { setBusy(false); return; }
      for (const k of keys) await window.storage.set(k, payload.entries[k]);
      setMsg("✓ Restored! Reloading…");
      setTimeout(() => window.location.reload(), 800);
      return;
    } catch (e) {
      setMsg("That doesn't look like an AviYatra backup file — nothing was changed.");
      setBusy(false);
    }
  }

  return (
    <div className="panel">
      <div className="panel-title">💾 Backup &amp; Restore</div>
      <p className="hint" style={{ marginTop: 0 }}>
        {protectedOn === null
          ? "Checking storage protection…"
          : protectedOn
            ? "🛡️ Protected storage: ON — Android has agreed not to auto-delete this app's data."
            : "⚠️ Protected storage: OFF — the phone may still clear data when space runs low. Keep backups!"}
      </p>
      {lastBackup !== undefined && (() => {
        const days = lastBackup ? Math.floor((Date.now() - new Date(lastBackup).getTime()) / 86400000) : null;
        const stale = days === null || days > 7;
        const text = days === null
          ? "⚠️ No backup yet — take your first one now, it takes one tap!"
          : days === 0 ? "✓ Last backup: today — you're safe."
          : days > 7 ? `⚠️ Last backup: ${days} days ago — tickets uploaded since then are unprotected. Time for a fresh one!`
          : `✓ Last backup: ${days} day${days > 1 ? "s" : ""} ago.`;
        return <p className={"hint " + (stale ? "hint-warn" : "hint-ok")} style={{ marginTop: 0 }}>{text}</p>;
      })()}
      <div className="section-row">
        <button className="btn-accent" disabled={busy} onClick={exportBackup}>⬇️ Backup now</button>
        <label className="btn-ghost" style={{ cursor: "pointer", opacity: busy ? 0.5 : 1 }}>
          ⬆️ Restore
          <input type="file" accept=".json,application/json" style={{ display: "none" }} disabled={busy}
            onChange={(e) => { importBackup(e.target.files && e.target.files[0]); e.target.value = ""; }} />
        </label>
      </div>
      {msg && <p className="hint">{msg}</p>}
      <p className="hint">One tap saves everything — trips, desks, tickets and all uploaded images — to a single file. Restore brings it all back after a data wipe or on a new phone.</p>
    </div>
  );
}

function parseDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function dsOf(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

// Office desk window: opens Friday night 12, for the week after next.
// e.g. Fri 17 Jul night opens Mon 27 – Fri 31 Jul.
function deskWindowOpenDate(dateStr) {
  const d = parseDate(dateStr);
  const monday = new Date(d.getFullYear(), d.getMonth(), d.getDate() - ((d.getDay() + 6) % 7));
  return dsOf(new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() - 10));
}

function shiftDateTimeHours(dateStr, timeStr, hours) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const [hh, mm] = (timeStr || "12:00").split(":").map(Number);
  const dt = new Date(y, m - 1, d, hh, mm);
  dt.setHours(dt.getHours() + hours);
  return { date: dsOf(dt), time: `${String(dt.getHours()).padStart(2, "0")}:${String(dt.getMinutes()).padStart(2, "0")}` };
}

function shiftDays(dateStr, n) {
  if (!dateStr) return dateStr;
  const d = parseDate(dateStr);
  return dsOf(new Date(d.getFullYear(), d.getMonth(), d.getDate() + n));
}

const HOLIDAYS = {
  "2026-08-26": "Office holiday",
  "2026-08-28": "Office holiday",
  "2026-09-14": "Office holiday",
  "2026-10-02": "Office holiday",
  "2026-11-10": "Office holiday",
  "2026-12-25": "Office holiday",
};

function mondayOf(ds) {
  const d = parseDate(ds);
  return dsOf(new Date(d.getFullYear(), d.getMonth(), d.getDate() - ((d.getDay() + 6) % 7)));
}

function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("read failed"));
    r.readAsDataURL(file);
  });
}

async function compressImage(file) {
  const src = await readFileAsDataURL(file);
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => rej(new Error("not an image"));
    i.src = src;
  });
  const maxDim = 2000;
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const c = document.createElement("canvas");
  c.width = Math.round(img.width * scale);
  c.height = Math.round(img.height * scale);
  c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
  return c.toDataURL("image/jpeg", 0.85);
}

function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve();
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      res();
    };
    s.onerror = () => rej(new Error("pdf.js load failed"));
    document.head.appendChild(s);
  });
}

async function fileToDataUrl(file) {
  if (file && file.type === "application/pdf") {
    await loadPdfJs();
    const buf = await file.arrayBuffer();
    const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
    const page = await pdf.getPage(1);
    const vp = page.getViewport({ scale: 2 });
    const c = document.createElement("canvas");
    c.width = vp.width;
    c.height = vp.height;
    await page.render({ canvasContext: c.getContext("2d"), viewport: vp }).promise;
    return c.toDataURL("image/jpeg", 0.9);
  }
  return compressImage(file);
}

function CalendarView({ trips, openTrip }) {
  const now = new Date();
  const [cur, setCur] = useState({ y: now.getFullYear(), m: now.getMonth() });
  const [sel, setSel] = useState(todayStr());

  const dayInfo = useMemo(() => {
    const map = {};
    const ensure = (ds) => (map[ds] = map[ds] || { trips: [], tickets: [], reminders: [], desks: [] });
    for (const t of trips) {
      if (t.start) {
        let d = parseDate(t.start);
        const e = parseDate(t.end || t.start);
        let guard = 0;
        while (d <= e && guard < 370) {
          ensure(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`).trips.push(t);
          d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
          guard++;
        }
      }
      for (const tk of t.tickets || []) {
        if (tk.date) ensure(tk.date).tickets.push({ ...tk, tripName: t.name, tripId: t.id });
      }
      for (const r of t.reminders || []) {
        if (r.date) ensure(r.date).reminders.push({ ...r, tripName: t.name, tripId: t.id });
      }
      for (const o of t.officeDays || []) {
        if (o.date) ensure(o.date).desks.push({ ...o, tripName: t.name, tripId: t.id });
      }
    }
    return map;
  }, [trips]);

  const first = new Date(cur.y, cur.m, 1);
  const offset = first.getDay();
  const nDays = new Date(cur.y, cur.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(null);
  for (let d = 1; d <= nDays; d++) cells.push(d);
  const monthName = first.toLocaleDateString("en-IN", { month: "long", year: "numeric" });

  const selInfo = dayInfo[sel];
  const selTickets = selInfo?.tickets || [];
  const selReminders = selInfo?.reminders || [];
  const selTrips = selInfo?.trips || [];

  return (
    <section>
      <div className="cal-head">
        <button className="btn-ghost arrow" onClick={() => setCur((c) => (c.m === 0 ? { y: c.y - 1, m: 11 } : { y: c.y, m: c.m - 1 }))}>‹</button>
        <div className="cal-month">{monthName}</div>
        <button className="btn-ghost arrow" onClick={() => setCur((c) => (c.m === 11 ? { y: c.y + 1, m: 0 } : { y: c.y, m: c.m + 1 }))}>›</button>
      </div>

      <div className="cal-grid">
        {["S", "M", "T", "W", "T", "F", "S"].map((w, i) => <div key={"w" + i} className="cal-wd">{w}</div>)}
        {cells.map((d, i) => {
          if (d === null) return <div key={"e" + i} />;
          const ds = `${cur.y}-${String(cur.m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          const info = dayInfo[ds];
          const dayTk = info?.tickets || [];
          const desks = info?.desks || [];
          const inTrip = (info?.trips.length || 0) > 0;
          const travelDay = (info?.trips || []).some((t) => !t.planOnly && (ds === t.start || ds === (t.end || t.start)));
          const bookedTks = dayTk.filter((tk) => tk.status !== "pending");
          const hasPending = dayTk.some((tk) => tk.status === "pending")
            || desks.some((o) => !o.booked)
            || (travelDay && dayTk.length === 0);
          const doneCount = bookedTks.length + desks.filter((o) => o.booked).length;
          const unarchived = bookedTks.some((tk) => !tk.archived);
          const hasRem = (info?.reminders.length || 0) > 0;
          const isHol = !!HOLIDAYS[ds];
          const icons = [...new Set([...(isHol ? ["🎉"] : []), ...dayTk.map((tk) => TYPE_META[tk.type]?.icon || "🎫"), ...(desks.length ? ["🪑"] : [])])].slice(0, 2);
          return (
            <button key={ds}
              className={"cal-day" + (inTrip ? " in-trip" : "") + (isHol ? " holiday" : "") + (ds === todayStr() ? " today" : "") + (ds === sel ? " sel" : "")}
              onClick={() => setSel(ds)}>
              <span>{d}</span>
              <span className="cal-icons">{icons.join("")}</span>
              <span className="cal-dots">
                {hasPending && <i className="dot pending" />}
                {doneCount > 0 && <i className={"dot " + (unarchived ? "booked" : "saved")} />}
                {hasRem && <i className="dot rem" />}
              </span>
            </button>
          );
        })}
      </div>

      <div className="cal-legend">
        <span>✈️🚌 Travel · 🪑 Office · 🎉 Holiday</span>
        <span><i className="dot saved" /> Booked + copy saved</span>
        <span><i className="dot booked" /> Booked, copy NOT saved</span>
        <span><i className="dot pending" /> Not booked yet</span>
        <span><i className="dot rem" /> Reminder</span>
      </div>

      <div className="cal-detail">
        <div className="section-label">{fmtDate(sel)}</div>
        {HOLIDAYS[sel] && (
          <div className="feed-row static holiday-row">
            <span className="feed-icon">🎉</span>
            <span className="feed-main">
              <span className="feed-title">{HOLIDAYS[sel]}</span>
              <span className="feed-sub">Avoid being in Bengaluru — plan travel around this or take WFH</span>
            </span>
          </div>
        )}
        {!selInfo && !HOLIDAYS[sel] && <div className="empty"><p>Nothing planned on this day.</p></div>}
        {selTickets.map((tk) => (
          <button key={tk.id} className="feed-row" onClick={() => openTrip(tk.tripId)}>
            <span className="feed-icon">{TYPE_META[tk.type]?.icon || "🎫"}</span>
            <span className="feed-main">
              <span className="feed-title">{tk.title}</span>
              <span className="feed-sub">{tk.tripName}{tk.time ? " · " + fmtTime(tk.time) : ""}{tk.ref ? " · " + tk.ref : ""}</span>
            </span>
            {tk.status === "pending"
              ? <span className="badge badge-warn">Not booked</span>
              : tk.archived
                ? <span className="badge badge-ok">📎 Saved</span>
                : <span className="badge badge-amber">📎 No copy</span>}
          </button>
        ))}
        {selReminders.map((r) => (
          <button key={r.id} className="feed-row" onClick={() => openTrip(r.tripId)}>
            <span className="feed-icon">🔔</span>
            <span className="feed-main">
              <span className="feed-title">{r.text}</span>
              <span className="feed-sub">{r.tripName}</span>
            </span>
          </button>
        ))}
        {(selInfo?.desks || []).map((o) => {
          const dOpen = daysUntil(deskWindowOpenDate(o.date));
          return (
            <button key={o.id} className="feed-row" onClick={() => openTrip(o.tripId)}>
              <span className="feed-icon">🪑</span>
              <span className="feed-main">
                <span className="feed-title">Office day</span>
                <span className="feed-sub">{o.tripName}{!o.booked && dOpen > 0 ? " · window opens " + fmtDate(deskWindowOpenDate(o.date)) : ""}</span>
              </span>
              {o.booked
                ? <span className="badge badge-ok">Desk booked</span>
                : dOpen <= 0
                  ? <span className="badge badge-hot">Book desk now!</span>
                  : <span className="badge badge-warn">Desk pending</span>}
            </button>
          );
        })}
        {selTrips.map((t) => {
          const bookedHere = selTickets.some((tk) => tk.tripId === t.id);
          const travelDay = !t.planOnly && (sel === t.start || sel === (t.end || t.start));
          return (
            <button key={t.id} className="feed-row" onClick={() => openTrip(t.id)}>
              <span className="feed-icon">🧳</span>
              <span className="feed-main">
                <span className="feed-title">{t.name}</span>
                <span className="feed-sub">{t.destination || "Trip day"}</span>
              </span>
              {!bookedHere && travelDay && <span className="badge badge-warn">No ticket yet</span>}
            </button>
          );
        })}
      </div>
    </section>
  );
}

function PlanView({ trips, openTrip, onPlanWeek }) {
  const startMon = mondayOf(todayStr());
  const weeks = [];
  for (let i = 0; i < 52; i++) {
    const mon = shiftDays(startMon, i * 7);
    const fri = shiftDays(mon, 4);
    const weekDates = [0, 1, 2, 3, 4].map((n) => shiftDays(mon, n));
    const hols = weekDates.filter((x) => HOLIDAYS[x]);
    const trip = trips.find((t) => t.start && (t.end || t.start) >= mon && t.start <= fri);
    const nearHol = !hols.length && Object.keys(HOLIDAYS).some((h) => Math.abs(daysUntil(h) - daysUntil(mon)) <= 10);
    weeks.push({ mon, fri, hols, trip, nearHol });
  }
  return (
    <section>
      <p className="hint" style={{ marginBottom: 12 }}>Full year ahead (52 weeks). Tap + Plan on a free week, set your travel-out and return dates (any span) — legs and 3 office days per week are created automatically, with book-by alarms ~1 month early for flights. Holiday weeks suggest WFH instead.</p>
      {weeks.map((w) => (
        <div key={w.mon} className={"feed-row static" + (w.hols.length && !w.trip ? " warn-row" : "")}>
          <span className="feed-icon">{w.trip ? "✅" : w.hols.length ? "🎉" : "🧳"}</span>
          <span className="feed-main">
            <span className="feed-title">{fmtDate(w.mon)} – {fmtDate(w.fri)}</span>
            <span className="feed-sub">
              {w.trip ? "Planned: " + w.trip.name
                : w.hols.length ? `Holiday${w.hols.length > 1 ? "s" : ""} on ${w.hols.map((h) => fmtDate(h)).join(", ")} — suggest WFH exemption / skip travel`
                : w.nearHol ? "Free — festival nearby, book flights EXTRA early if travelling"
                : "Free — office week?"}
            </span>
          </span>
          {w.trip
            ? <button className="btn-ghost small" onClick={() => openTrip(w.trip.id)}>Open</button>
            : !w.hols.length && <button className="btn-accent" style={{ padding: "6px 10px", fontSize: 12 }}
                onClick={() => onPlanWeek(w.mon)}>+ Plan</button>}
        </div>
      ))}
    </section>
  );
}

  const [openJ, setOpenJ] = useState({});
  const tickets = [...(trip.tickets || [])].sort((a, b) => ((a.date || "") + (a.time || "")).localeCompare((b.date || "") + (b.time || "")));
  const reminders = [...(trip.reminders || [])].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  const officeDays = [...(trip.officeDays || [])].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  const checklist = trip.checklist || [];
  const done = checklist.filter((c) => c.done).length;

  return (
    <>
      <header className="trip-header">
        <button className="btn-ghost" onClick={p.back}>← Trips</button>
        <div className="trip-header-actions">
          <button className="btn-ghost" onClick={p.onDuplicate}>Duplicate</button>
          <button className="btn-ghost" onClick={p.onEdit}>Edit</button>
          <button className="btn-ghost danger" onClick={p.onDelete}>Delete</button>
        </div>
      </header>
      <div className="trip-hero">
        <h2>{trip.name}</h2>
        <div className="trip-meta">
          {trip.destination && <span>📍 {trip.destination}</span>}
          {trip.start && <span>{fmtDate(trip.start)}{trip.end ? " → " + fmtDate(trip.end) : ""}</span>}
        </div>
        {trip.notes && <p className="trip-notes">{trip.notes}</p>}
      </div>

      <nav className="tabs">
        {[["tickets", `Tickets (${tickets.length})`], ["desk", `🪑 Desk (${officeDays.length})`], ["reminders", `Alerts (${reminders.length})`], ["packing", `Pack ${checklist.length ? `(${done}/${checklist.length})` : ""}`]].map(([id, label]) => (
          <button key={id} className={"tab" + (tab === id ? " on" : "")} onClick={() => setTab(id)}>{label}</button>
        ))}
      </nav>

      {tab === "tickets" && (
        <section>
          <button className="btn-accent full" onClick={p.onAddTicket}>+ Add ticket</button>
          {tickets.length === 0 && <div className="empty"><div className="empty-icon">🎫</div><p>Save your flight, train, bus and hotel bookings here — PNR, seat, timings — so everything's in one place.</p></div>}
          {(() => {
            const groups = { onward: [], return: [], other: [] };
            for (const tk of tickets) groups[tk.journey === "onward" ? "onward" : tk.journey === "return" ? "return" : "other"].push(tk);
            const journeyCard = (jkey, label) => {
              const legs = groups[jkey];
              if (!legs.length) return null;
              const first = legs[0], last = legs[legs.length - 1];
              const pending = legs.filter((x) => x.status === "pending").length;
              const noCopy = legs.filter((x) => x.status !== "pending" && !x.archived).length;
              const isOpen = !!openJ[jkey];
              return (
                <div key={jkey}>
                  <button className={"journey-head" + (pending ? " warn-row" : "")} onClick={() => setOpenJ({ ...openJ, [jkey]: !isOpen })}>
                    <span className="feed-icon">🧭</span>
                    <span className="feed-main">
                      <span className="feed-title">{first.from} → {last.to}</span>
                      <span className="feed-sub">{label} · {legs.length} leg{legs.length > 1 ? "s" : ""} via {first.to} · {fmtDate(first.date)}{last.date !== first.date ? " – " + fmtDate(last.date) : ""}</span>
                    </span>
                    {pending > 0
                      ? <span className="badge badge-warn">{pending} to book</span>
                      : noCopy > 0
                        ? <span className="badge badge-amber">📎 {noCopy} pending</span>
                        : <span className="badge badge-ok">All set ✓</span>}
                    <span className="chev">{isOpen ? "▾" : "▸"}</span>
                  </button>
                  {isOpen && legs.map((tk) => (
                    <Ticket key={tk.id} tk={tk} onEdit={() => p.onEditTicket(tk)}
                      onUpload={(file, kind) => p.onUploadImage(tk, file, kind)}
                      onView={(kind) => p.onViewImage(tk, kind)}
                      onRemoveImg={(kind) => p.onRemoveImage(tk, kind)}
                      onCheckFare={() => p.onCheckFare(tk)}
                      onDelete={() => { if (confirm("Delete this ticket?")) p.onDeleteTicket(tk.id); }} />
                  ))}
                </div>
              );
            };
            return (
              <>
                {journeyCard("onward", "Onward")}
                {journeyCard("return", "Return")}
                {groups.other.map((tk) => (
                  <Ticket key={tk.id} tk={tk} onEdit={() => p.onEditTicket(tk)}
                    onUpload={(file, kind) => p.onUploadImage(tk, file, kind)}
                    onView={(kind) => p.onViewImage(tk, kind)}
                    onRemoveImg={(kind) => p.onRemoveImage(tk, kind)}
                    onCheckFare={() => p.onCheckFare(tk)}
                    onDelete={() => { if (confirm("Delete this ticket?")) p.onDeleteTicket(tk.id); }} />
                ))}
              </>
            );
          })()}
        </section>
      )}

      {tab === "desk" && (
        <section>
          <div className="check-add">
            <input type="date" value={officeDate} onChange={(e) => setOfficeDate(e.target.value)} />
            <button className="btn-accent" onClick={() => { p.onAddOfficeWeek(officeDate); setOfficeDate(""); }}>+ Add week</button>
          </div>
          <p className="hint" style={{ marginBottom: 10 }}>Pick any date — the whole working week (Mon–Fri, minus holidays) is added. You book desks for the full week together; preferred seat <b>{p.deskSeat}</b>.</p>
          {officeDays.length === 0 && <div className="empty"><div className="empty-icon">🪑</div><p>Add your office weeks. For each, I'll compute when the desk window opens (Friday night 12, for the week after next) and alert you to book seat {p.deskSeat}.</p></div>}
          {(() => {
            const wkMap = new Map();
            for (const o of officeDays) {
              const mon = mondayOf(o.date);
              if (!wkMap.has(mon)) wkMap.set(mon, []);
              wkMap.get(mon).push(o);
            }
            return [...wkMap.entries()].map(([mon, days]) => {
              const allBooked = days.every((o) => o.booked);
              const open = deskWindowOpenDate(days[0].date);
              const dOpen = daysUntil(open);
              const dayNames = days.map((o) => parseDate(o.date).toLocaleDateString("en-IN", { weekday: "short", day: "numeric" })).join(", ");
              return (
                <div key={mon} className={"feed-row static" + (!allBooked ? " warn-row" : "")}>
                  <span className="feed-icon">🪑</span>
                  <span className="feed-main">
                    <span className="feed-title">Week of {fmtDate(mon)} · seat {p.deskSeat}</span>
                    <span className="feed-sub">{dayNames}</span>
                    <span className="feed-sub">{allBooked ? "Desks booked ✓" : dOpen <= 0 ? "Window OPEN — book the whole week now!" : `Window opens Fri ${fmtDate(open)} night 12`}</span>
                  </span>
                  {!allBooked && dOpen > 0 && <span className="badge">Opens in {dOpen}d</span>}
                  {!allBooked && dOpen <= 0 && <span className="badge badge-hot">Book now!</span>}
                  <button className={"checkbox" + (allBooked ? " done" : "")} onClick={() => p.onToggleDeskWeek(days.map((o) => o.id), !allBooked)}>{allBooked ? "✓" : ""}</button>
                  <button className="x" onClick={() => { if (confirm("Remove this office week?")) p.onDeleteOfficeDays(days.map((o) => o.id)); }}>✕</button>
                </div>
              );
            });
          })()}
          {officeDays.length > 0 && <p className="hint">Tick the box once you've booked the whole week's desks in the office system.</p>}
        </section>
      )}

      {tab === "reminders" && (
        <section>
          <button className="btn-accent full" onClick={p.onAddReminder}>+ Add reminder</button>
          {reminders.length === 0 && <div className="empty"><div className="empty-icon">🔔</div><p>Add things like "Web check-in opens", "Carry passport photocopy", "Confirm hotel". They appear on your home feed with a countdown.</p></div>}
          {reminders.map((r) => (
            <div key={r.id} className="feed-row static">
              <span className="feed-icon">🔔</span>
              <span className="feed-main">
                <span className="feed-title">{r.text}</span>
                <span className="feed-sub">{fmtDate(r.date)}</span>
              </span>
              <Countdown dateStr={r.date} />
              <button className="x" onClick={() => p.onDeleteReminder(r.id)}>✕</button>
            </div>
          ))}
        </section>
      )}

      {tab === "packing" && (
        <section>
          <div className="check-add">
            <input value={checkText} placeholder="Add item — e.g. charger, medicines" onChange={(e) => setCheckText(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { p.onAddCheck(checkText); setCheckText(""); } }} />
            <button className="btn-accent" onClick={() => { p.onAddCheck(checkText); setCheckText(""); }}>Add</button>
          </div>
          {checklist.map((c) => (
            <div key={c.id} className="check-row">
              <button className={"checkbox" + (c.done ? " done" : "")} onClick={() => p.onToggleCheck(c.id)}>{c.done ? "✓" : ""}</button>
              <span className={"check-text" + (c.done ? " done" : "")}>{c.text}</span>
              <button className="x" onClick={() => p.onDeleteCheck(c.id)}>✕</button>
            </div>
          ))}
        </section>
      )}
    </>
  );
}

function Ticket({ tk, onEdit, onDelete, onUpload, onView, onRemoveImg, onCheckFare }) {
  const meta = TYPE_META[tk.type] || TYPE_META.other;
  const fileBtn = (kind, has, labelUp, labelView) => has ? (
    <span className="file-pair">
      <button className="btn-view" onClick={() => onView(kind)}>{labelView}</button>
      <button className="btn-ghost small" style={{ color: "#8a8474" }} onClick={() => onRemoveImg(kind)}>✕</button>
    </span>
  ) : (
    <label className="btn-upload">
      {labelUp}
      <input type="file" accept="image/*,application/pdf" style={{ display: "none" }}
        onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) onUpload(f, kind); e.target.value = ""; }} />
    </label>
  );
  return (
    <div className="ticket">
      <div className="ticket-stub">
        <span className="ticket-icon">{meta.icon}</span>
        <span className="ticket-type">{meta.label}</span>
      </div>
      <div className="ticket-body">
        <div className="ticket-title">{tk.title || meta.label}</div>
        {(tk.from || tk.to) && <div className="ticket-route">{tk.from}{tk.from && tk.to ? " → " : ""}{tk.to}</div>}
        <div className="ticket-grid">
          {tk.date && <div><label>Date</label><span>{fmtDate(tk.date)}</span></div>}
          {tk.time && <div><label>Time</label><span>{fmtTime(tk.time)}</span></div>}
          {tk.ref && <div><label>PNR / Ref</label><span>{tk.ref}</span></div>}
          {tk.seat && <div><label>Seat / Room</label><span>{tk.seat}</span></div>}
          {tk.fileRef && <div><label>Copy saved at</label><span>{tk.fileRef}</span></div>}
        </div>
        {tk.notes && <div className="ticket-notes">{tk.notes}</div>}
        <div className="ticket-file">
          {fileBtn("tkimg", tk.img, "📎 Upload ticket", "🎫 View ticket")}
          {tk.type === "flight" && fileBtn("bp", tk.bpImg, "🛂 Upload boarding pass", "🛂 Boarding pass")}
          {tk.status === "pending" && <button className="btn-upload" onClick={onCheckFare}>💹 Check fares</button>}
        </div>
        <div className="ticket-actions">
          {tk.status === "pending" && <span className="badge badge-warn">Not booked yet</span>}
          {tk.status !== "pending" && (tk.archived
            ? <span className="badge badge-ok">📎 Saved</span>
            : <span className="badge badge-amber">📎 No copy</span>)}
          <Countdown dateStr={tk.date} />
          <span className="spacer" />
          <button className="btn-ghost small" onClick={onEdit}>Edit</button>
          <button className="btn-ghost small danger" onClick={onDelete}>Delete</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Forms ---------------- */

function Modal({ title, children, onClose }) {
  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-head">
          <h3>{title}</h3>
          <button className="x" onClick={onClose}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function TripForm({ edit, onSave, onClose }) {
  const [f, setF] = useState({ name: edit?.name || "", destination: edit?.destination || "", start: edit?.start || "", end: edit?.end || "", notes: edit?.notes || "" });
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  return (
    <Modal title={edit ? "Edit trip" : "New trip"} onClose={onClose}>
      <label className="fl">Trip name *</label>
      <input value={f.name} onChange={set("name")} placeholder="e.g. Mumbai client visit" />
      <label className="fl">Destination</label>
      <input value={f.destination} onChange={set("destination")} placeholder="City / country" />
      <div className="two">
        <div><label className="fl">Start date</label><input type="date" value={f.start} onChange={set("start")} /></div>
        <div><label className="fl">End date</label><input type="date" value={f.end} onChange={set("end")} /></div>
      </div>
      <label className="fl">Notes</label>
      <textarea rows={2} value={f.notes} onChange={set("notes")} placeholder="Purpose, addresses, contacts…" />
      <button className="btn-accent full" disabled={!f.name.trim()} onClick={() => onSave(f)}>
        {edit ? "Save changes" : "Create trip"}
      </button>
    </Modal>
  );
}

function TicketForm({ edit, onSave, onClose }) {
  const [f, setF] = useState({
    type: edit?.type || "flight", title: edit?.title || "", from: edit?.from || "", to: edit?.to || "",
    date: edit?.date || todayStr(), time: edit?.time || "", ref: edit?.ref || "", seat: edit?.seat || "", notes: edit?.notes || "",
    status: edit?.status || "booked", bookOpen: edit?.bookOpen || "", archived: edit?.archived || false, fileRef: edit?.fileRef || "",
    journey: edit?.journey || "onward",
  });
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const isHotel = f.type === "hotel";
  return (
    <Modal title={edit ? "Edit ticket" : "Add ticket"} onClose={onClose}>
      <div className="type-picker">
        {Object.entries(TYPE_META).map(([id, m]) => (
          <button key={id} className={"type-chip" + (f.type === id ? " on" : "")} onClick={() => setF({ ...f, type: id })}>
            {m.icon} {m.label}
          </button>
        ))}
      </div>
      <label className="fl">Title *</label>
      <input value={f.title} onChange={set("title")} placeholder={isHotel ? "Hotel name" : "e.g. IndiGo 6E-302 or 12955 Jan Shatabdi"} />
      {!isHotel && (
        <div className="two">
          <div><label className="fl">From</label><input value={f.from} onChange={set("from")} placeholder="Origin" /></div>
          <div><label className="fl">To</label><input value={f.to} onChange={set("to")} placeholder="Destination" /></div>
        </div>
      )}
      <div className="two">
        <div><label className="fl">{isHotel ? "Check-in date" : "Date"}</label><input type="date" value={f.date} onChange={set("date")} /></div>
        <div><label className="fl">{isHotel ? "Check-in time" : "Departure time"}</label><input type="time" value={f.time} onChange={set("time")} /></div>
      </div>
      <div className="two">
        <div><label className="fl">PNR / Booking ref</label><input value={f.ref} onChange={set("ref")} placeholder="e.g. ABC123" /></div>
        <div><label className="fl">{isHotel ? "Room" : "Seat / Coach"}</label><input value={f.seat} onChange={set("seat")} placeholder={isHotel ? "e.g. 204" : "e.g. 14A / B2-32"} /></div>
      </div>
      <label className="fl">Part of which journey?</label>
      <div className="type-picker">
        <button className={"type-chip" + (f.journey === "onward" ? " on" : "")} onClick={() => setF({ ...f, journey: "onward" })}>Onward (BHL → BLR)</button>
        <button className={"type-chip" + (f.journey === "return" ? " on" : "")} onClick={() => setF({ ...f, journey: "return" })}>Return (BLR → BHL)</button>
        <button className={"type-chip" + (f.journey !== "onward" && f.journey !== "return" ? " on" : "")} onClick={() => setF({ ...f, journey: "" })}>Standalone</button>
      </div>
      <label className="fl">Booking status</label>
      <div className="type-picker">
        <button className={"type-chip" + (f.status !== "pending" ? " on" : "")} onClick={() => setF({ ...f, status: "booked" })}>✓ Booked</button>
        <button className={"type-chip" + (f.status === "pending" ? " on" : "")} onClick={() => setF({ ...f, status: "pending" })}>⏳ Not booked yet</button>
      </div>
      {f.status === "pending" && (
        <>
          <label className="fl">Booking window opens on (optional)</label>
          <input type="date" value={f.bookOpen} onChange={set("bookOpen")} />
          <p className="hint">This ticket stays in the "To book" list on your home screen. On this date it turns into a red "Book now!" alert.</p>
        </>
      )}
      {f.status !== "pending" && (
        <>
          <label className="fl">Ticket copy saved? (screenshot / PDF / email)</label>
          <div className="type-picker">
            <button className={"type-chip" + (f.archived ? " on" : "")} onClick={() => setF({ ...f, archived: true })}>📎 Copy saved</button>
            <button className={"type-chip" + (!f.archived ? " on" : "")} onClick={() => setF({ ...f, archived: false })}>Not saved yet</button>
          </div>
          {f.archived && (
            <>
              <label className="fl">Where is it saved?</label>
              <input value={f.fileRef} onChange={set("fileRef")} placeholder="e.g. Google Drive › Travel, Gmail, phone gallery" />
            </>
          )}
        </>
      )}
      <label className="fl">Notes</label>
      <textarea rows={2} value={f.notes} onChange={set("notes")} placeholder="Terminal, gate, baggage, contact number…" />
      <button className="btn-accent full" disabled={!f.title.trim()} onClick={() => onSave(f)}>
        {edit ? "Save changes" : "Save ticket"}
      </button>
    </Modal>
  );
}

function PlanForm({ mon, onSave, onClose }) {
  const [f, setF] = useState({ out: mon, back: shiftDays(mon, 9) });
  return (
    <Modal title="Plan a BLR trip" onClose={onClose}>
      <div className="two">
        <div><label className="fl">Travel out (BHL → AHM)</label><input type="date" value={f.out} onChange={(e) => setF({ ...f, out: e.target.value })} /></div>
        <div><label className="fl">Return (back in BHL)</label><input type="date" value={f.back} onChange={(e) => setF({ ...f, back: e.target.value })} /></div>
      </div>
      <p className="hint">Creates all 4 legs (bus + flight each way, pending, with book-by alarms: flights ~30 days ahead, buses ~15) and 3 office days (Tue–Thu) in every week of your stay — holidays skipped. You can adjust everything afterwards.</p>
      <button className="btn-accent full" disabled={!f.out || !f.back} onClick={() => onSave(f.out, f.back)}>Create trip</button>
    </Modal>
  );
}

function ReminderForm({ onSave, onClose }) {
  const [f, setF] = useState({ text: "", date: todayStr() });
  return (
    <Modal title="Add reminder" onClose={onClose}>
      <label className="fl">What should I remind you about? *</label>
      <input value={f.text} onChange={(e) => setF({ ...f, text: e.target.value })} placeholder="e.g. Web check-in opens" />
      <label className="fl">On which date</label>
      <input type="date" value={f.date} onChange={(e) => setF({ ...f, date: e.target.value })} />
      <p className="hint">Reminders show on your home screen with a countdown whenever you open the app.</p>
      <button className="btn-accent full" disabled={!f.text.trim()} onClick={() => onSave(f)}>Save reminder</button>
    </Modal>
  );
}

/* ---------------- Styles ---------------- */

  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        --bg: #101828; --card: #1a2438; --line: #27324a;
        --text: #eef2fa; --mut: #94a0b8;
        --accent: #f5a524; --accent-ink: #241a05;
        --paper: #f8f4ea; --paper-ink: #23201a; --paper-mut: #6f6a5d;
        --danger: #ff7a7a;
        /* --photo is defined in the head style block */
      }
      .masthead-photo { height: 170px; border-radius: 16px; border: 1px solid var(--line); margin-top: 12px;

        min-height: 100vh; color: var(--text);
        background:

          var(--photo) center 18% / cover no-repeat fixed,

        font-family: 'IBM Plex Sans', system-ui, sans-serif;
        max-width: 460px; margin: 0 auto; padding: 16px 16px 48px;
      }
      h1, h2, h3, .trip-name, .ticket-title { font-family: 'Space Grotesk', system-ui, sans-serif; }
      .loading { padding: 60px 0; text-align: center; color: var(--mut); }
      .today-card { background: linear-gradient(135deg, #2a3453, #1c2542); border: 1px solid var(--accent);
        border-radius: 16px; padding: 14px; margin-bottom: 14px; box-shadow: 0 6px 22px rgba(245,165,36,0.10); }
      .today-title { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 17px; font-weight: 700; }
      .today-leg { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05);

      @keyframes toastfade { 0% { opacity: 0; transform: translate(-50%, 8px); } 12% { opacity: 1; transform: translate(-50%, 0); }
        75% { opacity: 1; } 100% { opacity: 0; } }
      .save-warn { background: #3a2020; color: #ffb4b4; border: 1px solid #5c3030; padding: 8px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 12px; }
